/* ---------- Setup wizard ----------
   Builds this month's history first (income, invoices, bills, spending), running each
   item through the same allocation/conversion logic as normal data entry, so the bucket
   math arrives at a realistic state. Only at the very end does the person enter their
   actual current account balances — which simply overwrite whatever the simulation
   produced, since the real bank balance is ground truth. */
const SETUP_STEPS = [
  { id: "projection", title: "Monthly income projection" },
  { id: "paychecks", title: "Paychecks logged this month" },
  { id: "invoices", title: "Invoices" },
  { id: "bills", title: "Bills this month" },
  { id: "spending", title: "Additional spending" },
  { id: "balances", title: "Current account balances" },
  { id: "moneydate", title: "Weekly money date" },
];

const DAY_NAMES = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

function SetupWizard({ state, update, isMobile, onFinish }) {
  // all wizard progress lives in state.setupDraft so it survives closing and reopening
  // the app — every setter below writes through `update`, same pattern as the rest
  // of the app, rather than local component state that would vanish on unmount.
  const draft = state.setupDraft;

  function patchDraft(patch) {
    update((s) => ({ ...s, setupDraft: { ...s.setupDraft, ...patch } }));
  }

  const step = draft.step;
  const setStep = (n) => patchDraft({ step: n });
  const projection = draft.projection;
  const setProjection = (v) => patchDraft({ projection: v });
  const draftPaychecks = draft.draftPaychecks;
  const setDraftPaychecks = (fn) =>
    patchDraft({ draftPaychecks: typeof fn === "function" ? fn(draft.draftPaychecks) : fn });
  const draftInvoices = draft.draftInvoices;
  const setDraftInvoices = (fn) =>
    patchDraft({ draftInvoices: typeof fn === "function" ? fn(draft.draftInvoices) : fn });
  const draftBillsPaid = draft.draftBillsPaid;
  const setDraftBillsPaid = (fn) =>
    patchDraft({ draftBillsPaid: typeof fn === "function" ? fn(draft.draftBillsPaid) : fn });
  const draftSpending = draft.draftSpending;
  const setDraftSpending = (fn) =>
    patchDraft({ draftSpending: typeof fn === "function" ? fn(draft.draftSpending) : fn });
  const balances = draft.balances;
  const setBalances = (fn) =>
    patchDraft({ balances: typeof fn === "function" ? fn(draft.balances) : fn });

  const mKey = monthKey();
  const stepInfo = SETUP_STEPS[step];

  function goNext() {
    if (step < SETUP_STEPS.length - 1) setStep(step + 1);
  }
  function goBack() {
    if (step > 0) setStep(step - 1);
  }

  /* runs all drafted history through the same engines used elsewhere in the app,
     building up income/transfers/buckets in order, then overwrites the resulting
     balances with whatever was entered in the final step. */
  function commitSetup() {
    update((s) => {
      let working = { ...s, monthlyIncomeProjection: projection };

      // 1. paychecks — each runs through allocateIncome, same as the Income tab
      draftPaychecks.forEach((p) => {
        const entry = {
          id: uid("inc"),
          date: p.date,
          amount: round2(parseFloat(p.amount) || 0),
          type: p.type,
          monthKey: monthKey(parseLocalDate(p.date)),
        };
        if (entry.amount <= 0) return;
        const moves = allocateIncome(entry, working);
        const newBuckets = { ...working.buckets };
        const newTransfers = [...working.transfers];
        moves.forEach((m) => {
          newBuckets[m.bucket] = round2((newBuckets[m.bucket] || 0) + m.amount);
          if (m.bucket === "savings" || m.bucket === "tax" || m.bucket === "bills") {
            newTransfers.push({
              id: uid("xfer"),
              fromAccount: "Checking",
              toAccount: ACCOUNT_DISPLAY_NAMES[m.bucket] || m.bucket,
              amount: m.amount,
              note: m.note,
              target: m.bucket,
              done: !!m.alreadyDeducted,
              createdAt: entry.date,
              monthKey: entry.monthKey,
            });
          }
        });
        working = { ...working, income: [...working.income, entry], buckets: newBuckets, transfers: newTransfers };
      });

      // 2. invoices — unpaid ones just get added; paid ones convert to income via the
      //    same conversion function used on the Invoices tab (always freelance, dated today
      //    for the income entry, but keeping their real issue date on the invoice record)
      draftInvoices.forEach((inv) => {
        const amount = round2(parseFloat(inv.amount) || 0);
        if (!inv.description || amount <= 0) return;
        const invoiceRecord = {
          id: uid("inv"),
          description: inv.description,
          amount,
          issueDate: inv.issueDate,
          status: "unpaid",
          paidDate: null,
          incomeId: null,
        };
        working = { ...working, invoices: [...working.invoices, invoiceRecord] };
        if (inv.status === "paid") {
          working = convertInvoiceToIncome(working, invoiceRecord.id);
        }
      });

      // 3. bills — mark drafted ones paid for this month, same as the checkbox elsewhere
      Object.keys(draftBillsPaid).forEach((billId) => {
        if (draftBillsPaid[billId]) {
          working = markBillPaid(working, billId);
        }
      });

      // 4. additional category spending
      const newSpending = [...working.spending];
      draftSpending.forEach((sp) => {
        const amount = round2(parseFloat(sp.amount) || 0);
        if (!sp.category || amount <= 0) return;
        newSpending.push({
          id: uid("sp"),
          category: sp.category,
          description: sp.description ? sp.description.trim() : "",
          amount,
          date: sp.date,
          monthKey: monthKey(parseLocalDate(sp.date)),
          tags: parseTags(sp.tags),
        });
      });
      working = { ...working, spending: newSpending };

      // recompute slush/STSS split now that the full month's drafted history is in
      const split = computeMonthlySplit(working, mKey);
      working = {
        ...working,
        buckets: { ...working.buckets, slush: split.slushAdd, stss: split.stssAdd },
      };

      // 5. final step: actual balances overwrite whatever the simulation produced —
      // the real bank balance is ground truth, not the simulated one
      working = {
        ...working,
        buckets: {
          ...working.buckets,
          checking: round2(parseFloat(balances.checking) || 0),
          savings: round2(parseFloat(balances.savings) || 0),
          bills: round2(parseFloat(balances.bills) || 0),
          tax: round2(parseFloat(balances.tax) || 0),
          slush: round2(parseFloat(balances.slush) || 0),
          stss: round2(parseFloat(balances.stss) || 0),
        },
        setupCompleted: true,
        // clear the draft now that it's been committed, so a future re-entry into
        // Setup (via the nav) starts fresh rather than replaying old history
        setupDraft: initialState.setupDraft,
      };

      return working;
    });
    onFinish();
  }

  return (
    <div>
      <SectionTitle eyebrow={`Step ${step + 1} of ${SETUP_STEPS.length}`}>{stepInfo.title}</SectionTitle>

      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, fontSize: 12, color: "#8B96A3" }}>
        <i className="ti ti-device-floppy" style={{ fontSize: 13 }} aria-hidden="true" />
        Your progress saves automatically — close this any time and pick back up later.
      </div>

      <div style={{ display: "flex", gap: 4, marginBottom: 20, marginTop: 10, flexWrap: "wrap" }}>
        {SETUP_STEPS.map((st, i) => (
          <div
            key={st.id}
            onClick={() => setStep(i)}
            style={{
              flex: isMobile ? "0 0 auto" : 1,
              height: 4,
              borderRadius: 2,
              background: i <= step ? "#1C2B3A" : "#E3DDC9",
              cursor: "pointer",
              minWidth: isMobile ? 28 : undefined,
            }}
          />
        ))}
      </div>

      {step === 0 && (
        <Card style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 12 }}>
            What do you expect to bring in this month, in total? This is used to track pace
            against your income as the month goes on.
          </div>
          <Input
            type="number"
            value={projection}
            onChange={(e) => setProjection(parseFloat(e.target.value) || 0)}
            style={{ width: 140 }}
          />
        </Card>
      )}

      {step === 1 && (
        <PaycheckDraftStep drafts={draftPaychecks} setDrafts={setDraftPaychecks} />
      )}

      {step === 2 && (
        <InvoiceDraftStep drafts={draftInvoices} setDrafts={setDraftInvoices} />
      )}

      {step === 3 && (
        <BillsDraftStep bills={state.bills} draftPaid={draftBillsPaid} setDraftPaid={setDraftBillsPaid} />
      )}

      {step === 4 && (
        <SpendingDraftStep
          budgets={state.budgets}
          drafts={draftSpending}
          setDrafts={setDraftSpending}
          knownTags={Array.from(
            new Set(
              state.spending.flatMap((sp) => (sp.tags && sp.tags.length ? sp.tags : sp.tag ? [sp.tag] : []))
            )
          )}
        />
      )}

      {step === 5 && (
        <Card>
          <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 14 }}>
            Last step — enter your real current balances. These overwrite anything the history
            above would otherwise add up to, since your actual bank balance is what matters.
          </div>
          <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 1fr" : "repeat(3, 1fr)", gap: 14 }}>
            {[
              { key: "checking", label: "Checking" },
              { key: "savings", label: "Savings" },
              { key: "bills", label: "Bills" },
              { key: "tax", label: "Taxes" },
              { key: "slush", label: "Slush fund" },
              { key: "stss", label: "STSS (goals)" },
            ].map((f) => (
              <div key={f.key}>
                <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>{f.label}</div>
                <Input
                  type="number"
                  value={balances[f.key] || state.buckets[f.key] || 0}
                  onChange={(e) =>
                    setBalances((b) => ({ ...b, [f.key]: e.target.value }))
                  }
                  style={{ width: "100%" }}
                />
              </div>
            ))}
          </div>
        </Card>
      )}

      {step === 6 && (
        <Card>
          <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 14 }}>
            A recurring weekly time to check in on your finances together. You'll get a heads-up
            banner in the app 30 minutes before. You can change this any time from the Alerts tab.
          </div>
          <MoneyDateControls moneyDate={state.moneyDate} update={update} />
        </Card>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 24 }}>
        <Button variant="ghost" onClick={goBack} style={{ visibility: step === 0 ? "hidden" : "visible" }}>
          Back
        </Button>
        {step < SETUP_STEPS.length - 1 ? (
          <Button onClick={goNext}>Next</Button>
        ) : (
          <Button onClick={commitSetup}>Finish setup</Button>
        )}
      </div>

      {state.setupCompleted && (
        <div style={{ marginTop: 20, textAlign: "center" }}>
          <span
            onClick={onFinish}
            style={{ fontSize: 12.5, color: "#8B96A3", cursor: "pointer" }}
          >
            Cancel and return to dashboard
          </span>
        </div>
      )}
    </div>
  );
}

function PaycheckDraftStep({ drafts, setDrafts }) {
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState(todayISO());
  const [type, setType] = useState("regular");

  function add() {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return;
    setDrafts((d) => [...d, { id: uid("draft"), amount, date, type }]);
    setAmount("");
  }
  function remove(id) {
    setDrafts((d) => d.filter((x) => x.id !== id));
  }

  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 12 }}>
        Add each paycheck or freelance payment you've already received this month, with the date
        it landed. For regular paychecks, enter the amount that hit checking.
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end", marginBottom: 14 }}>
        <Input type="number" placeholder="Amount" value={amount} onChange={(e) => setAmount(e.target.value)} style={{ width: 110 }} />
        <Input type="date" value={date} onChange={(e) => setDate(e.target.value)} />
        <select
          value={type}
          onChange={(e) => setType(e.target.value)}
          style={{ fontFamily: "Inter, sans-serif", fontSize: 14, padding: "8px 10px", borderRadius: 6, border: "1px solid #D8D2C2", background: "#FFFEFB", color: "#1C2B3A" }}
        >
          <option value="regular">Regular</option>
          <option value="freelance">Freelance</option>
        </select>
        <Button variant="subtle" onClick={add}>Add</Button>
      </div>
      {drafts.length === 0 ? (
        <div style={{ fontSize: 13, color: "#8B96A3" }}>None added yet — that's fine if this is your first paycheck of the month.</div>
      ) : (
        <Ledger>
          {drafts.map((d) => (
            <LedgerRow
              key={d.id}
              label={d.type === "freelance" ? "Freelance income" : "Regular income"}
              sub={formatLocalDate(d.date)}
              amount={parseFloat(d.amount) || 0}
              right={
                <span onClick={() => remove(d.id)} style={{ fontSize: 12, color: "#8B96A3", cursor: "pointer" }}>
                  Remove
                </span>
              }
            />
          ))}
        </Ledger>
      )}
    </Card>
  );
}

function InvoiceDraftStep({ drafts, setDrafts }) {
  const [description, setDescription] = useState("");
  const [amount, setAmount] = useState("");
  const [issueDate, setIssueDate] = useState(todayISO());
  const [status, setStatus] = useState("unpaid");

  function add() {
    const amt = parseFloat(amount);
    if (!description || !amt || amt <= 0) return;
    setDrafts((d) => [...d, { id: uid("draft"), description, amount, issueDate, status }]);
    setDescription("");
    setAmount("");
  }
  function remove(id) {
    setDrafts((d) => d.filter((x) => x.id !== id));
  }

  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 12 }}>
        Add any invoices relevant to this month — both ones you're still waiting on, and ones
        already paid. Paid ones will be converted into freelance income automatically.
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end", marginBottom: 14 }}>
        <Input placeholder="Description" value={description} onChange={(e) => setDescription(e.target.value)} style={{ width: 200 }} />
        <Input type="number" placeholder="Amount" value={amount} onChange={(e) => setAmount(e.target.value)} style={{ width: 100 }} />
        <Input type="date" value={issueDate} onChange={(e) => setIssueDate(e.target.value)} />
        <select
          value={status}
          onChange={(e) => setStatus(e.target.value)}
          style={{ fontFamily: "Inter, sans-serif", fontSize: 14, padding: "8px 10px", borderRadius: 6, border: "1px solid #D8D2C2", background: "#FFFEFB", color: "#1C2B3A" }}
        >
          <option value="unpaid">Unpaid</option>
          <option value="paid">Already paid</option>
        </select>
        <Button variant="subtle" onClick={add}>Add</Button>
      </div>
      {drafts.length === 0 ? (
        <div style={{ fontSize: 13, color: "#8B96A3" }}>No invoices yet — skip ahead if this doesn't apply to you.</div>
      ) : (
        <Ledger>
          {drafts.map((d) => (
            <LedgerRow
              key={d.id}
              label={d.description}
              sub={`Issued ${formatLocalDate(d.issueDate)} · ${d.status}`}
              amount={parseFloat(d.amount) || 0}
              right={
                <span onClick={() => remove(d.id)} style={{ fontSize: 12, color: "#8B96A3", cursor: "pointer" }}>
                  Remove
                </span>
              }
            />
          ))}
        </Ledger>
      )}
    </Card>
  );
}

function BillsDraftStep({ bills, draftPaid, setDraftPaid }) {
  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 12 }}>
        Check off any of your recurring bills that you've already paid so far this month.
      </div>
      <Ledger>
        {[...bills].sort((a, b) => a.day - b.day).map((b) => (
          <LedgerRow
            key={b.id}
            label={b.name}
            sub={`Due on the ${ordinal(b.day)}`}
            amount={b.amount}
            right={
              <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, color: "#1C2B3A", cursor: "pointer" }}>
                <input
                  type="checkbox"
                  checked={!!draftPaid[b.id]}
                  onChange={() => setDraftPaid((d) => ({ ...d, [b.id]: !d[b.id] }))}
                />
                Already paid
              </label>
            }
          />
        ))}
      </Ledger>
    </Card>
  );
}

function SpendingDraftStep({ budgets, drafts, setDrafts, knownTags }) {
  const categoryOptions = [
    ...Object.entries(budgets).map(([key, b]) => ({ key, label: b.label })),
    { key: "other", label: "Other" },
  ];

  const [category, setCategory] = useState(categoryOptions[0].key);
  const [description, setDescription] = useState("");
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState(todayISO());
  const [tags, setTags] = useState("");

  function categoryLabel(key) {
    return categoryOptions.find((c) => c.key === key)?.label || key;
  }

  function add() {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return;
    setDrafts((d) => [...d, { id: uid("draft"), category, description, amount, date, tags }]);
    setDescription("");
    setAmount("");
    setTags("");
  }
  function remove(id) {
    setDrafts((d) => d.filter((x) => x.id !== id));
  }

  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 12 }}>
        Add any groceries, gas, eating-out, or other spending from earlier this month that you
        want reflected in your budgets.
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end", marginBottom: 14 }}>
        <select
          value={category}
          onChange={(e) => setCategory(e.target.value)}
          style={{ fontFamily: "Inter, sans-serif", fontSize: 14, padding: "8px 10px", borderRadius: 6, border: "1px solid #D8D2C2", background: "#FFFEFB", color: "#1C2B3A" }}
        >
          {categoryOptions.map((c) => (
            <option key={c.key} value={c.key}>{c.label}</option>
          ))}
        </select>
        <Input
          placeholder="Description"
          value={description}
          onChange={(e) => setDescription(e.target.value)}
          style={{ width: 160 }}
        />
        <Input type="number" placeholder="Amount" value={amount} onChange={(e) => setAmount(e.target.value)} style={{ width: 100 }} />
        <Input type="date" value={date} onChange={(e) => setDate(e.target.value)} />
        <TagInput
          placeholder="Tags, comma separated"
          knownTags={knownTags}
          value={tags}
          onChange={(val) => setTags(val)}
          style={{ width: 180 }}
        />
        <Button variant="subtle" onClick={add}>Add</Button>
      </div>
      {drafts.length === 0 ? (
        <div style={{ fontSize: 13, color: "#8B96A3" }}>Nothing added yet — that's fine if you're starting fresh.</div>
      ) : (
        <Ledger>
          {drafts.map((d) => (
            <LedgerRow
              key={d.id}
              label={d.description ? d.description : categoryLabel(d.category)}
              sub={`${categoryLabel(d.category)} · ${formatLocalDate(d.date)}${d.tags ? " · " + d.tags : ""}`}
              amount={parseFloat(d.amount) || 0}
              right={
                <span onClick={() => remove(d.id)} style={{ fontSize: 12, color: "#8B96A3", cursor: "pointer" }}>
                  Remove
                </span>
              }
            />
          ))}
        </Ledger>
      )}
    </Card>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BudgetApp />);
</script>
</body>
</html>
