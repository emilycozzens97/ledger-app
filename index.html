<script>
  function showLoadError(detail) {
    var root = document.getElementById('root');
    if (root && !root.innerHTML) {
      root.innerHTML =
        '<div style="padding:24px;font-family:sans-serif;color:#8A3C28;max-width:560px;margin:40px auto;">' +
        '<h3>Something went wrong loading this page</h3>' +
        (detail
          ? '<p style="font-family:monospace;font-size:13px;background:#F3E3DC;padding:10px;border-radius:6px;">' + detail + '</p>'
          : '') +
        '<p>If this mentions a missing script or network error, check your internet connection and reload. ' +
        'If it mentions a syntax or code error, that is a bug in the app itself and reloading will not help.</p>' +
        '</div>';
    }
  }
  window.addEventListener('error', function (e) {
    showLoadError(e.message || (e.error && e.error.message) || 'Unknown error');
  });
  // fallback check in case nothing has rendered after a few seconds (e.g. a script
  // silently failed to load rather than throwing a catchable error)
  setTimeout(function () {
    if (window.__loadFailed || typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof Babel === 'undefined') {
      showLoadError('A required script (React, ReactDOM, or Babel) did not load. Check your internet connection.');
    }
  }, 6000);
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo } = React;

/* ---------- storage helpers ---------- */
const STORE_KEY = "budget_app_state_v1";

async function loadState() {
  try {
    const raw = window.localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}
async function saveState(state) {
  try {
    window.localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error("save failed", e);
  }
}

/* ---------- defaults ---------- */
const DEFAULT_BILLS = [
  { id: "b1", name: "Progressive insurance", amount: 85, day: 3, paid: false, paidMonthKey: null },
  { id: "b2", name: "Boost mobile", amount: 27, day: 14, paid: false, paidMonthKey: null },
  { id: "b3", name: "BeyondFinance", amount: 432.76, day: 18, paid: false, paidMonthKey: null },
  { id: "b4", name: "Spotify", amount: 14.06, day: 20, paid: false, paidMonthKey: null },
  { id: "b5", name: "VASA fitness", amount: 27.98, day: 20, paid: false, paidMonthKey: null },
];

const DEFAULT_BUDGETS = {
  groceries: { label: "Groceries", monthly: 400 },
  gas: { label: "Gas", monthly: 160 },
  eatingOut: { label: "Eating out", monthly: 120 },
};

/* today's date as "YYYY-MM-DD" in LOCAL time — toISOString() always returns UTC,
   which can report the wrong calendar day depending on timezone and time of day. */
const todayISO = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
};
const monthKey = (d = new Date()) =>
  `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
const daysInMonth = (d = new Date()) =>
  new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
const dayOfMonth = (d = new Date()) => d.getDate();

/* Parses a "YYYY-MM-DD" date-only string as LOCAL midnight, not UTC midnight.
   new Date("2026-06-20") parses as UTC, which then displays as the previous day
   in any timezone behind UTC (e.g. all of the US) — this avoids that off-by-one. */
function parseLocalDate(dateStr) {
  if (!dateStr) return new Date();
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, (m || 1) - 1, d || 1);
}

/* Formats a "YYYY-MM-DD" date-only string for display, using local-midnight parsing
   so the displayed day always matches what was actually entered. */
function formatLocalDate(dateStr) {
  return parseLocalDate(dateStr).toLocaleDateString();
}

const fmt = (n) =>
  (n < 0 ? "-$" : "$") +
  Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function uid(prefix = "id") {
  return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
}

/* ---------- initial state ---------- */
const initialState = {
  bills: DEFAULT_BILLS,
  budgets: DEFAULT_BUDGETS,
  income: [], // { id, date, amount, type: 'regular'|'freelance', monthKey }
  spending: [], // { id, date, category, amount, monthKey, tags: string[], description? }
  goals: [], // { id, name, cost, hasDeadline, deadline, status: 'wishlist'|'active', weeklyOverride }
  transfers: [], // { id, label, amount, target, done, createdAt, monthKey }
  bailouts: [], // { id, fromBucket, toBucket, amount, reason, date, monthKey }
  buckets: { savings: 0, tax: 0, slush: 0, stss: 0, bills: 0, checking: 0 },
  alerts: {
    paceAlertOn: true,
    spendingPaceAlertOn: true,
    billWinAlertOn: true,
    weeklyProjectionAlertOn: true,
    custom: [],
  },
  monthlyIncomeProjection: 3000,
  invoices: [], // { id, description, amount, issueDate, status: 'unpaid'|'paid', paidDate, incomeId }
  billPaidHistory: [], // { id, billId, billName, amount, monthKey, paidDate }
  currentBillsMonthKey: null, // set on first load to this month's key
  setupCompleted: false,
  setupDraft: {
    step: 0,
    projection: 3000,
    draftPaychecks: [],
    draftInvoices: [],
    draftBillsPaid: {},
    draftSpending: [],
    balances: { checking: 0, savings: 0, bills: 0, tax: 0, slush: 0, stss: 0 },
  },
  moneyDate: { enabled: false, dayOfWeek: 0, time: "18:00" }, // dayOfWeek: 0=Sun..6=Sat
  lastWin: null, // { billName, id, at } — transient, cleared after the Dashboard shows it
  shoppingList: [], // { id, name, checked }
  knownLimitations: [
    {
      id: "lim_widget",
      request: "A live Android home-screen widget showing the dashboard",
      why: "Home-screen widgets are a native OS feature (Android's AppWidgetProvider). A web artifact runs in a sandboxed browser environment and has no path to the home screen — it can only become a tappable shortcut icon, not a live-updating tile.",
      solution: "Build this as a real native Android app (Kotlin/Java, via Android Studio), using AppWidgetProvider for the widget and the app's own local database for data. That's a separate software project you'd build and install yourself — sideloaded as an APK or published to the Play Store.",
    },
    {
      id: "lim_push",
      request: "Real push notifications or text messages for alerts (money date, pace warnings, bill wins, weekly projection) even when the app is closed",
      why: "This app has no access to Android's notification system, SMS, or any channel that reaches your phone outside of this chat. Browser notification APIs are blocked inside the artifact sandbox, and even outside it, they only work while a tab is open. I also have no scheduler or memory that runs between conversations, so I can't independently check the app later and message you.",
      solution: "A native Android app (see above) using AlarmManager/WorkManager to schedule local notifications, or a small backend service using Firebase Cloud Messaging if you want notifications to sync across devices. Either path is a real build, not an extension of this artifact.",
    },
    {
      id: "lim_sync",
      request: "True cross-device sync between phone and computer, independent of which conversation or link the app was opened from",
      why: "Artifact storage is tied to the specific artifact instance (this conversation, this account) — not to a portable app identity. Opening a downloaded copy of the code, a remix, or a fresh conversation creates entirely separate storage, even though the code is identical. Today, continuity only works if both devices open this exact same conversation's artifact.",
      solution: "A real backend (e.g. a hosted database with user accounts, like Firebase, Supabase, or a custom API) that the app talks to over the network, instead of relying on artifact-local storage. That would let any device log into the same account and see the same data, regardless of which copy of the code it's running. This means turning the app into an actual deployed product with its own server, not just an artifact.",
    },
  ],
};

const REGULAR_INCOME_SAVINGS_FLAT = 50;

/* ---------- core allocation engine ----------
   Regular income: the $50 savings transfer happens BEFORE the paycheck hits checking.
   So `entry.amount` for a regular paycheck is what actually lands in checking — the
   true gross was amount + $50. The $50 is logged as a savings move, but it's not
   subtracted from `amount` again since it already never touched checking.

   Freelance income: no automatic pre-deduction. `entry.amount` is the full amount,
   and we take 15% tax + 10% savings out of it in-app, same as before. */
function allocateIncome(entry, state) {
  const { amount, type } = entry;
  let remaining = amount;
  const moves = [];

  if (type === "freelance") {
    const tax = round2(amount * 0.15);
    moves.push({ bucket: "tax", amount: tax, note: "Freelance tax set-aside (15%)" });
    remaining -= tax;

    const savings = round2(amount * 0.1);
    moves.push({ bucket: "savings", amount: savings, note: "Automatic savings (10%)" });
    remaining -= savings;
  } else {
    // regular income: $50 already pulled before checking, logged here for visibility
    // but not subtracted from `remaining` since `amount` is already net of it
    moves.push({
      bucket: "savings",
      amount: REGULAR_INCOME_SAVINGS_FLAT,
      note: "Automatic savings ($50, pulled before checking)",
      alreadyDeducted: true,
    });
  }

  // remainder goes toward bills account first
  const billsMove = round2(remaining);
  moves.push({ bucket: "bills", amount: billsMove, note: "To bills account" });
  remaining -= billsMove;

  // after this, budgets (groceries/gas/eating out) are tracked separately as spending limits,
  // not a literal transfer — so whatever's left after bills is the slush/STSS pool source.
  // We treat "remaining" here as 0 since billsMove consumed it; the real slush split happens
  // at the monthly level once bills+budgets are known. See computeMonthlySplit.

  return moves;
}

function round2(n) {
  return Math.round(n * 100) / 100;
}

/* parses a raw comma-separated tag string into a clean array,
   trimming whitespace and dropping empty entries */
function parseTags(raw) {
  if (!raw) return [];
  return raw
    .split(",")
    .map((t) => t.trim())
    .filter(Boolean);
}

/* marks a bill paid for the current month, logging it to paid history.
   also handles rolling bills over to unpaid if we've crossed into a new month
   since they were last touched. */
function rolloverBillsIfNewMonth(state) {
  const mKey = monthKey();
  if (state.currentBillsMonthKey === mKey) return state;
  // new month: reset all bills to unpaid, keep history as-is
  return {
    ...state,
    bills: state.bills.map((b) => ({ ...b, paid: false, paidMonthKey: null })),
    currentBillsMonthKey: mKey,
  };
}

function markBillPaid(state, billId) {
  const mKey = monthKey();
  const bill = state.bills.find((b) => b.id === billId);
  if (!bill) return state;

  const nowPaid = !bill.paid;
  const newBills = state.bills.map((b) =>
    b.id === billId ? { ...b, paid: nowPaid, paidMonthKey: nowPaid ? mKey : null } : b
  );

  let newHistory = state.billPaidHistory;
  let lastWin = state.lastWin || null;
  if (nowPaid) {
    newHistory = [
      ...state.billPaidHistory,
      {
        id: uid("paid"),
        billId: bill.id,
        billName: bill.name,
        amount: bill.amount,
        monthKey: mKey,
        paidDate: todayISO(),
      },
    ];
    // a "win" — paid on or before its due day this month — surfaces a one-time
    // celebratory banner on the Dashboard, cleared after it's been shown
    if (bill.day >= dayOfMonth()) {
      lastWin = { billName: bill.name, id: uid("win"), at: Date.now() };
    }
  } else {
    // unchecking — remove the most recent matching history entry for this bill/month
    const idx = newHistory
      .map((h, i) => (h.billId === billId && h.monthKey === mKey ? i : -1))
      .filter((i) => i >= 0)
      .pop();
    if (idx != null) newHistory = newHistory.filter((_, i) => i !== idx);
  }

  return { ...state, bills: newBills, billPaidHistory: newHistory, lastWin };
}

/* converts a paid invoice into a freelance income entry, dated today,
   while preserving the invoice's original issue date for reporting */
function convertInvoiceToIncome(state, invoiceId) {
  const invoice = state.invoices.find((i) => i.id === invoiceId);
  if (!invoice || invoice.status === "paid") return state;

  const incomeEntry = {
    id: uid("inc"),
    date: todayISO(),
    amount: round2(invoice.amount),
    type: "freelance",
    monthKey: monthKey(),
    fromInvoiceId: invoice.id,
  };

  const moves = allocateIncome(incomeEntry, state);
  const newBuckets = { ...state.buckets };
  const newTransfers = [...state.transfers];

  moves.forEach((m) => {
    newBuckets[m.bucket] = round2((newBuckets[m.bucket] || 0) + m.amount);
    newTransfers.push({
      id: uid("xfer"),
      fromAccount: "Checking",
      toAccount: ACCOUNT_DISPLAY_NAMES[m.bucket] || m.bucket,
      amount: m.amount,
      note: `${m.note} — invoice: ${invoice.description}`,
      target: m.bucket,
      done: !!m.alreadyDeducted,
      createdAt: incomeEntry.date,
      monthKey: incomeEntry.monthKey,
    });
  });

  const tempState = { ...state, income: [...state.income, incomeEntry] };
  const split = computeMonthlySplit(tempState, incomeEntry.monthKey);
  newBuckets.slush = split.slushAdd;
  newBuckets.stss = split.stssAdd;

  const newInvoices = state.invoices.map((i) =>
    i.id === invoiceId
      ? { ...i, status: "paid", paidDate: incomeEntry.date, incomeId: incomeEntry.id }
      : i
  );

  return {
    ...state,
    income: [...state.income, incomeEntry],
    invoices: newInvoices,
    buckets: newBuckets,
    transfers: newTransfers,
  };
}

/* computes, for a given month, the leftover after bills+budgets are covered by income so far,
   and splits that leftover 50/50 into slush and stss.
   totalBills here is the full month's bill load (for planning purposes), while
   paidBillsTotal tracks what's actually been paid so far this cycle. */
function computeMonthlySplit(state, mKey) {
  const incomeThisMonth = state.income.filter((i) => i.monthKey === mKey);
  const totalIncome = incomeThisMonth.reduce((s, i) => s + i.amount, 0);

  const freelanceTax = incomeThisMonth
    .filter((i) => i.type === "freelance")
    .reduce((s, i) => s + round2(i.amount * 0.15), 0);

  // regular income's $50 savings is pulled before checking, so `amount` (what's logged)
  // is already net of it — don't subtract it again here. Only freelance's 10% actually
  // comes out of the logged amount.
  const freelanceSavingsCut = incomeThisMonth
    .filter((i) => i.type === "freelance")
    .reduce((s, i) => s + round2(i.amount * 0.1), 0);
  const regularSavingsLogged = incomeThisMonth
    .filter((i) => i.type === "regular")
    .reduce((s) => s + REGULAR_INCOME_SAVINGS_FLAT, 0);
  const savingsCut = freelanceSavingsCut; // only this portion reduces checking-bound money

  const totalBills = state.bills.reduce((s, b) => s + b.amount, 0);
  const paidBillsTotal = state.bills
    .filter((b) => b.paid && b.paidMonthKey === mKey)
    .reduce((s, b) => s + b.amount, 0);
  const totalBudgets = Object.values(state.budgets).reduce((s, b) => s + b.monthly, 0);

  const afterTaxSavings = totalIncome - freelanceTax - savingsCut;
  const leftover = afterTaxSavings - totalBills - totalBudgets;
  const usable = Math.max(0, leftover);

  return {
    totalIncome,
    freelanceTax,
    savingsCut, // freelance-only, for "money that left checking" math
    savingsLoggedTotal: round2(savingsCut + regularSavingsLogged), // for display: all savings, incl. pre-checking $50s
    totalBills,
    paidBillsTotal,
    unpaidBillsTotal: round2(totalBills - paidBillsTotal),
    totalBudgets,
    leftover,
    slushAdd: round2(usable / 2),
    stssAdd: round2(usable / 2),
  };
}

/* ---------- alert engine ---------- */
function checkPaceAlert(state) {
  const mKey = monthKey();
  const today = dayOfMonth();
  const totalDays = daysInMonth();
  const pace = today / totalDays;

  const incomeThisMonth = state.income
    .filter((i) => i.monthKey === mKey)
    .reduce((s, i) => s + i.amount, 0);

  const expectedByNow = round2(state.monthlyIncomeProjection * pace);

  const totalBillsBudgets =
    state.bills.reduce((s, b) => s + b.amount, 0) +
    Object.values(state.budgets).reduce((s, b) => s + b.monthly, 0);

  // only bills that are both past due AND actually marked paid count against "needed so far" —
  // unpaid bills still show for planning but haven't actually left the account yet
  const paidDueSoFar = state.bills
    .filter((b) => b.day <= today && b.paid && b.paidMonthKey === mKey)
    .reduce((s, b) => s + b.amount, 0);
  // pro-rate budgets due-so-far by pace too
  const budgetsDueSoFar = round2(
    Object.values(state.budgets).reduce((s, b) => s + b.monthly, 0) * pace
  );
  const neededSoFar = paidDueSoFar + budgetsDueSoFar;

  const behindPace = incomeThisMonth < expectedByNow;
  const behindNeed = incomeThisMonth < neededSoFar;

  return {
    fires: state.alerts.paceAlertOn && (behindPace || behindNeed) ? true : false,
    incomeThisMonth,
    expectedByNow,
    neededSoFar,
    behindPace,
    behindNeed,
    totalBillsBudgets,
  };
}

/* checks whether the next occurrence of the weekly money date falls within the
   next 30 minutes from now, so a heads-up banner can show in the app. */
function checkMoneyDateAlert(state) {
  const md = state.moneyDate;
  if (!md || !md.enabled) return { fires: false };

  const now = new Date();
  const [h, m] = (md.time || "18:00").split(":").map(Number);

  // find the next occurrence of the target day/time, today or up to 7 days out
  for (let offset = 0; offset <= 7; offset++) {
    const candidate = new Date(now);
    candidate.setDate(now.getDate() + offset);
    candidate.setHours(h, m, 0, 0);
    if (candidate.getDay() !== md.dayOfWeek) continue;
    const diffMs = candidate - now;
    const diffMin = diffMs / 60000;
    if (diffMin >= 0 && diffMin <= 30) {
      return { fires: true, eventTime: candidate };
    }
    break; // first matching day found and it's not in the alert window — stop looking
  }
  return { fires: false };
}

/* per-category spending pace, reusable wherever "ahead of pace" needs checking
   (Budgets cards already compute this inline; this is the shared version used
   for the Alerts tab and Dashboard banner). */
function checkSpendingPaceAlerts(state) {
  const mKey = monthKey();
  const today = dayOfMonth();
  const totalDays = daysInMonth();
  const pace = today / totalDays;

  return Object.entries(state.budgets)
    .map(([key, b]) => {
      const spent = state.spending
        .filter((sp) => sp.category === key && sp.monthKey === mKey)
        .reduce((s, sp) => s + sp.amount, 0);
      const expectedByNow = round2(b.monthly * pace);
      return { key, label: b.label, spent, expectedByNow, over: spent > expectedByNow + 0.01 };
    })
    .filter((c) => c.over);
}

/* builds the weekly projection digest: bills due in the next 7 days and a rough
   read on available funds (checking minus what's still owed against it this week). */
function buildWeeklyProjection(state) {
  const today = dayOfMonth();
  const totalDays = daysInMonth();
  const upcoming = state.bills
    .filter((b) => b.day >= today && b.day <= Math.min(today + 7, totalDays) && !b.paid)
    .sort((a, b) => a.day - b.day);
  const upcomingTotal = upcoming.reduce((s, b) => s + b.amount, 0);
  const availableFunds = round2((state.buckets.checking || 0) - upcomingTotal);

  return { upcoming, upcomingTotal, availableFunds };
}

/* ---------- UI primitives ---------- */
const Ledger = ({ children }) => (
  <div style={{ display: "flex", flexDirection: "column" }}>{children}</div>
);

/* a small inline-editable currency amount — click to switch to a number input,
   Enter or blur to save, Escape to cancel. Used for things like bill amounts
   that fluctuate slightly month to month. */
const EditableAmount = ({ value, onChange, tone, strikethrough }) => {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);

  function commit() {
    const v = parseFloat(draft);
    if (!isNaN(v) && v >= 0) onChange(Math.round(v * 100) / 100);
    setEditing(false);
  }

  if (editing) {
    return (
      <Input
        type="number"
        value={draft}
        autoFocus
        onChange={(e) => setDraft(e.target.value)}
        onBlur={commit}
        onKeyDown={(e) => {
          if (e.key === "Enter") commit();
          if (e.key === "Escape") setEditing(false);
        }}
        style={{ width: 80, fontSize: 13, padding: "4px 8px" }}
      />
    );
  }

  return (
    <span
      onClick={() => {
        setDraft(value);
        setEditing(true);
      }}
      title="Click to edit"
      style={{
        fontFamily: "'IBM Plex Mono', monospace",
        fontSize: 14,
        color: tone || "#1C2B3A",
        textDecoration: strikethrough ? "line-through" : "none",
        cursor: "pointer",
        borderBottom: "1px dashed #C7BFA8",
      }}
    >
      {fmt(value)}
    </span>
  );
};

/* a comma-separated tag input with a live auto-suggest dropdown. Matches against
   whichever tag segment is currently being typed (the text after the last comma),
   so picking a suggestion completes just that segment without disturbing tags
   already typed before it. Click outside or Escape closes the dropdown. */
const TagInput = ({ value, onChange, knownTags, placeholder, style }) => {
  const [open, setOpen] = useState(false);
  const [highlight, setHighlight] = useState(0);

  const segments = value.split(",");
  const currentSegment = segments[segments.length - 1].trim().toLowerCase();
  const alreadyUsed = segments.slice(0, -1).map((s) => s.trim().toLowerCase());

  const suggestions =
    currentSegment.length === 0
      ? knownTags.filter((t) => !alreadyUsed.includes(t.toLowerCase())).slice(0, 6)
      : knownTags
          .filter(
            (t) =>
              t.toLowerCase().includes(currentSegment) &&
              t.toLowerCase() !== currentSegment &&
              !alreadyUsed.includes(t.toLowerCase())
          )
          .slice(0, 6);

  function pickSuggestion(tag) {
    const completed = [...segments.slice(0, -1).map((s) => s.trim()), tag].filter(Boolean);
    onChange(completed.join(", ") + ", ");
    setOpen(false);
    setHighlight(0);
  }

  return (
    <div style={{ position: "relative", ...style }}>
      <Input
        placeholder={placeholder}
        value={value}
        onChange={(e) => {
          onChange(e.target.value);
          setOpen(true);
          setHighlight(0);
        }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 120)}
        onKeyDown={(e) => {
          if (!open || suggestions.length === 0) return;
          if (e.key === "ArrowDown") {
            e.preventDefault();
            setHighlight((h) => (h + 1) % suggestions.length);
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            setHighlight((h) => (h - 1 + suggestions.length) % suggestions.length);
          } else if (e.key === "Enter" || e.key === "Tab") {
            if (suggestions[highlight]) {
              e.preventDefault();
              pickSuggestion(suggestions[highlight]);
            }
          } else if (e.key === "Escape") {
            setOpen(false);
          }
        }}

/* tracks viewport width so layout can switch between desktop rail and mobile top bar */
function useIsMobile(breakpoint = 720) {
  const [isMobile, setIsMobile] = useState(
    typeof window !== "undefined" ? window.innerWidth < breakpoint : false
  );
  useEffect(() => {
    function onResize() {
      setIsMobile(window.innerWidth < breakpoint);
    }
    window.addEventListener("resize", onResize);
    onResize();
    return () => window.removeEventListener("resize", onResize);
  }, [breakpoint]);
  return isMobile;
}

function MetricCard({ label, value, tone, editable, onChange }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  const colors = {
    default: "#1C2B3A",
    gold: "#7A5D24",
  };

  function commit() {
    const v = parseFloat(draft);
    onChange(isNaN(v) ? value : round2(v));
    setEditing(false);
  }

  return (
    <div
      style={{
        background: tone === "gold" ? "#F8F0DC" : "#EDE9DC",
        borderRadius: 8,
        padding: "14px 16px",
      }}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
        <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 4 }}>{label}</div>
        {editable && !editing && (
          <i
            className="ti ti-edit"
            onClick={() => {
              setDraft(value);
              setEditing(true);
            }}
            style={{ fontSize: 14, color: "#8B96A3", cursor: "pointer" }}
            aria-label="Edit balance"
          />
        )}
      </div>
      {editing ? (
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <Input
            type="number"
            value={draft}
            autoFocus
            onChange={(e) => setDraft(e.target.value)}
            onKeyDown={(e) => {
              if (e.key === "Enter") commit();
              if (e.key === "Escape") setEditing(false);
            }}
            style={{ width: 90, fontSize: 15, padding: "5px 8px" }}
          />
          <i
            className="ti ti-check"
            onClick={commit}
            style={{ fontSize: 16, color: "#3B5C40", cursor: "pointer" }}
            aria-label="Save"
          />
        </div>
      ) : (
        <div
          style={{
            fontFamily: "'IBM Plex Mono', monospace",
            fontSize: 19,
            fontWeight: 500,
            color: colors[tone] || colors.default,
          }}
        >
          {fmt(value)}
        </div>
      )}
    </div>
  );
}

function ordinal(n) {
  const s = ["th", "st", "nd", "rd"];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

/* ---------- Income View ---------- */
function IncomeView({ state, update, isMobile }) {
  const [amount, setAmount] = useState("");
  const [type, setType] = useState("regular");
  const [date, setDate] = useState(todayISO());
  const mKey = monthKey();

  const monthIncome = state.income.filter((i) => i.monthKey === mKey);
  const totalThisMonth = monthIncome.reduce((s, i) => s + i.amount, 0);
  const projection = state.monthlyIncomeProjection;

  function addIncome() {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return;
    const entry = {
      id: uid("inc"),
      date,
      amount: round2(amt),
      type,
      monthKey: monthKey(parseLocalDate(date)),
    };

    update((s) => {
      const moves = allocateIncome(entry, s);
      const newBuckets = { ...s.buckets };
      const newTransfers = [...s.transfers];

      moves.forEach((m) => {
        newBuckets[m.bucket] = round2((newBuckets[m.bucket] || 0) + m.amount);
        if (m.bucket === "savings" || m.bucket === "tax" || m.bucket === "bills") {
          newTransfers.push({
            id: uid("xfer"),
            fromAccount: "Checking",
            toAccount: ACCOUNT_DISPLAY_NAMES[m.bucket] || m.bucket,
            amount: m.amount,
            note: m.note,
            target: m.bucket,
            done: !!m.alreadyDeducted, // $50 pre-checking transfer is already done by the bank
            createdAt: entry.date,
            monthKey: entry.monthKey,
          });
        }
      });

      // recompute monthly split for slush/STSS based on updated income
      const tempState = { ...s, income: [...s.income, entry] };
      const split = computeMonthlySplit(tempState, entry.monthKey);

      // Recompute slush/STSS from scratch each time income changes this month,
      // by resetting to the freshly computed split (idempotent w.r.t. all income logged).
      newBuckets.slush = split.slushAdd;
      newBuckets.stss = split.stssAdd;

      return {
        ...s,
        income: [...s.income, entry],
        buckets: newBuckets,
        transfers: newTransfers,
      };
    });

    setAmount("");
  }

  return (
    <div>
      <SectionTitle eyebrow="Variable income">Income</SectionTitle>

      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 20, marginBottom: 24 }}>
        <Card>
          <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 4 }}>
            Logged this month
          </div>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 26, color: "#1C2B3A" }}>
            {fmt(totalThisMonth)}
          </div>
          <div style={{ fontSize: 12.5, color: "#8B96A3", marginTop: 4 }}>
            of {fmt(projection)} projected
          </div>
          <div
            style={{
              height: 6,
              background: "#EDE9DC",
              borderRadius: 4,
              marginTop: 10,
              overflow: "hidden",
            }}
          >
            <div
              style={{
                height: "100%",
                width: `${Math.min(100, (totalThisMonth / projection) * 100)}%`,
                background: totalThisMonth >= projection ? "#6B8F71" : "#B8924A",
              }}
            />
          </div>
        </Card>

        <Card>
          <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 8 }}>
            Monthly income projection
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <Input
              type="number"
              value={projection}
              onChange={(e) =>
                update((s) => ({ ...s, monthlyIncomeProjection: parseFloat(e.target.value) || 0 }))
              }
              style={{ width: 120 }}
            />
            <span style={{ fontSize: 12.5, color: "#8B96A3" }}>
              Adjust as your estimate for the month changes
            </span>
          </div>
        </Card>
      </div>

      <Card style={{ marginBottom: 24 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 12 }}>Log a paycheck</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Amount</div>
            <Input
              type="number"
              placeholder="0.00"
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
              style={{ width: 110 }}
            />
          </div>
          <div>
            <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Date</div>
            <Input type="date" value={date} onChange={(e) => setDate(e.target.value)} />
          </div>
          <div>
            <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Type</div>
            <select
              value={type}
              onChange={(e) => setType(e.target.value)}
              style={{
                fontFamily: "Inter, sans-serif",
                fontSize: 14,
                padding: "8px 10px",
                borderRadius: 6,
                border: "1px solid #D8D2C2",
                background: "#FFFEFB",
                color: "#1C2B3A",
              }}
            >
              <option value="regular">Regular</option>
              <option value="freelance">Freelance</option>
            </select>
          </div>
          <Button onClick={addIncome}>Log income</Button>
        </div>
        {type === "freelance" ? (
          <div style={{ fontSize: 12, color: "#8B96A3", marginTop: 10 }}>
            15% will be set aside for taxes automatically, then 10% to savings, before bills and
            budgets.
          </div>
        ) : (
          <div style={{ fontSize: 12, color: "#8B96A3", marginTop: 10 }}>
            Enter the amount that actually lands in checking — the $50 automatic savings transfer
            happens before that and gets logged separately.
          </div>
        )}
      </Card>

      <Card>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 8 }}>This month's entries</div>
        {monthIncome.length === 0 ? (
          <div style={{ fontSize: 13, color: "#8B96A3" }}>No income logged yet this month.</div>
        ) : (
          <Ledger>
            {monthIncome
              .slice()
              .reverse()
              .map((i) => (
                <LedgerRow
                  key={i.id}
                  label={i.type === "freelance" ? "Freelance income" : "Regular income"}
                  sub={formatLocalDate(i.date)}
                  amount={i.amount}
                />
              ))}
          </Ledger>
        )}
      </Card>
    </div>
  );
}

function BudgetsView({ state, update, isMobile }) {
  const [newBillName, setNewBillName] = useState("");
  const [newBillAmount, setNewBillAmount] = useState("");
  const [newBillDay, setNewBillDay] = useState("");
  const [tagDrafts, setTagDrafts] = useState({}); // { [categoryKey]: rawCommaSeparatedString }
  const [expandedTags, setExpandedTags] = useState({}); // { [categoryKey]: boolean }
  const [otherExpanded, setOtherExpanded] = useState(true);

  const today = dayOfMonth();
  const totalDays = daysInMonth();
  const pace = today / totalDays;

  function addBill() {
    if (!newBillName || !newBillAmount || !newBillDay) return;
    update((s) => ({
      ...s,
      bills: [
        ...s.bills,
        { id: uid("bill"), name: newBillName, amount: parseFloat(newBillAmount), day: parseInt(newBillDay) },
      ],
    }));
    setNewBillName("");
    setNewBillAmount("");
    setNewBillDay("");
  }

  function removeBill(id) {
    update((s) => ({ ...s, bills: s.bills.filter((b) => b.id !== id) }));
  }

  function spentInCategory(cat, mKey) {
    return state.spending
      .filter((sp) => sp.category === cat && sp.monthKey === mKey)
      .reduce((sum, sp) => sum + sp.amount, 0);
  }

  // all tags ever used, for auto-suggest across every category.
  // falls back to legacy single `tag` field for entries logged before multi-tag support.
  const allKnownTags = useMemo(() => {
    const set = new Set();
    state.spending.forEach((sp) => {
      const tags = sp.tags && sp.tags.length ? sp.tags : sp.tag ? [sp.tag] : [];
      tags.forEach((t) => set.add(t));
    });
    return Array.from(set).sort();
  }, [state.spending]);

  function tagBreakdown(cat, mKey) {
    const entries = state.spending.filter((sp) => sp.category === cat && sp.monthKey === mKey);
    const groups = {};
    entries.forEach((sp) => {
      const tags = sp.tags && sp.tags.length ? sp.tags : sp.tag ? [sp.tag] : [];
      if (tags.length === 0) {
        groups["Untagged"] = (groups["Untagged"] || 0) + sp.amount;
      } else {
        // an entry with multiple tags counts its full amount toward each tag's total,
        // since the categories aren't mutually exclusive (e.g. a Costco trip can be
        // both "household" and "gifts")
        tags.forEach((tag) => {
          groups[tag] = (groups[tag] || 0) + sp.amount;
        });
      }
    });
    return Object.entries(groups).sort((a, b) => b[1] - a[1]);
  }

  const mKey = monthKey();

  return (
    <div>
      <SectionTitle eyebrow="Bills & spending limits">Budgets</SectionTitle>

      <Card style={{ marginBottom: 24 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 10 }}>Recurring bills</div>
        <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 10 }}>
          Click an amount to adjust it for small fluctuations.
        </div>
        <Ledger>
          {[...state.bills]
            .sort((a, b) => a.day - b.day)
            .map((b) => (
              <LedgerRow
                key={b.id}
                label={b.name}
                sub={`Due on the ${ordinal(b.day)}`}
                amount={b.amount}
                right={
                  <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                    <EditableAmount
                      value={b.amount}
                      tone={b.paid ? "#6B8F71" : "#1C2B3A"}
                      strikethrough={!!b.paid}
                      onChange={(v) =>
                        update((s) => ({
                          ...s,
                          bills: s.bills.map((x) => (x.id === b.id ? { ...x, amount: v } : x)),
                        }))
                      }
                    />
                    <label
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: 4,
                        fontSize: 11.5,
                        color: "#8B96A3",
                        cursor: "pointer",
                      }}
                    >
                      <input
                        type="checkbox"
                        checked={!!b.paid}
                        onChange={() => update((s) => markBillPaid(s, b.id))}
                      />
                      Paid
                    </label>
                    <span
                      onClick={() => removeBill(b.id)}
                      style={{ fontSize: 12, color: "#8B96A3", cursor: "pointer" }}
                    >
                      Remove
                    </span>
                  </div>
                }
              />
            ))}
        </Ledger>
        <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
          <Input
            placeholder="Bill name"
            value={newBillName}
            onChange={(e) => setNewBillName(e.target.value)}
            style={{ width: 160 }}
          />
          <Input
            placeholder="Amount"
            type="number"
            value={newBillAmount}
            onChange={(e) => setNewBillAmount(e.target.value)}
            style={{ width: 90 }}
          />
          <Input
            placeholder="Day (1-31)"
            type="number"
            min="1"
            max="31"
            value={newBillDay}
            onChange={(e) => setNewBillDay(e.target.value)}
            style={{ width: 100 }}
          />
          <Button variant="subtle" onClick={addBill}>
            Add bill
          </Button>
        </div>
      </Card>

      <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 12 }}>
        Groceries, gas & eating out
      </div>
      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(3, minmax(0, 1fr))", gap: 16 }}>
        {Object.entries(state.budgets).map(([key, b]) => {
          const spent = spentInCategory(key, mKey);
          const weeklyTarget = b.monthly / 4.33;
          const weekNum = Math.ceil(today / 7);
          const weeklyBudgetSoFar = weeklyTarget * weekNum;
          const pct = Math.min(100, (spent / b.monthly) * 100);
          const over = spent > b.monthly * pace + 0.01;

          return (
            <Card key={key}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ fontWeight: 500, fontSize: 14 }}>{b.label}</span>
                {over && <Pill tone="warn">Ahead of pace</Pill>}
              </div>
              <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 20, color: "#1C2B3A" }}>
                {fmt(spent)}
              </div>
              <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 8 }}>
                of {fmt(b.monthly)} this month
              </div>
              <div
                style={{
                  height: 6,
                  background: "#EDE9DC",
                  borderRadius: 4,
                  overflow: "hidden",
                  marginBottom: 10,
                }}
              >
                <div
                  style={{
                    height: "100%",
                    width: `${pct}%`,
                    background: over ? "#C1684F" : "#6B8F71",
                  }}
                />
              </div>
              <div style={{ fontSize: 12, color: "#8B96A3" }}>
                Week {weekNum}: {fmt(spentInCategory(key, mKey))} logged ·{" "}
                {fmt(weeklyTarget)}/wk target
              </div>
              <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                <Input
                  type="number"
                  placeholder="Log spend"
                  id={`spend-${key}`}
                  style={{ flex: 1, minWidth: 0 }}
                />
                <Button
                  variant="subtle"
                  style={{ padding: "6px 10px", fontSize: 12, flexShrink: 0 }}
                  onClick={() => {
                    const el = document.getElementById(`spend-${key}`);
                    const val = parseFloat(el.value);
                    if (!val) return;
                    const tags = parseTags(tagDrafts[key]);
                    update((s) => ({
                      ...s,
                      spending: [
                        ...s.spending,
                        {
                          id: uid("sp"),
                          category: key,
                          amount: val,
                          date: todayISO(),
                          monthKey: mKey,
                          tags,
                        },
                      ],
                    }));
                    el.value = "";
                    setTagDrafts((d) => ({ ...d, [key]: "" }));
                  }}
                >
                  Add
                </Button>
              </div>
              <div style={{ marginTop: 6 }}>
                <TagInput
                  placeholder="Tags, comma separated (optional)"
                  knownTags={allKnownTags}
                  value={tagDrafts[key] || ""}
                  onChange={(val) => setTagDrafts((d) => ({ ...d, [key]: val }))}
                  style={{ fontSize: 12.5 }}
                />
              </div>

              {(() => {
                const breakdown = tagBreakdown(key, mKey);
                const isOpen = !!expandedTags[key];
                if (breakdown.length === 0) return null;
                return (
                  <div style={{ marginTop: 10, borderTop: "1px solid #E3DDC9", paddingTop: 8 }}>
                    <div
                      onClick={() => setExpandedTags((e) => ({ ...e, [key]: !e[key] }))}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "space-between",
                        cursor: "pointer",
                      }}
                    >
                      <span style={{ fontSize: 12, color: "#8B96A3" }}>
                        By tag ({breakdown.length})
                      </span>
                      <i
                        className={`ti ti-chevron-${isOpen ? "up" : "down"}`}
                        style={{ fontSize: 14, color: "#8B96A3" }}
                        aria-hidden="true"
                      />
                    </div>
                    {isOpen && (
                      <div style={{ marginTop: 6, display: "flex", flexDirection: "column", gap: 4 }}>
                        {breakdown.map(([tag, total]) => (
                          <div
                            key={tag}
                            style={{
                              display: "flex",
                              justifyContent: "space-between",
                              fontSize: 12,
                              color: "#5F5E5A",
                            }}
                          >
                            <span
                              style={{
                                background: tag === "Untagged" ? "transparent" : "#EDE9DC",
                                padding: tag === "Untagged" ? 0 : "1px 7px",
                                borderRadius: 12,
                              }}
                            >
                              {tag}
                            </span>
                            <span style={{ fontFamily: "'IBM Plex Mono', monospace" }}>
                              {fmt(total)}
                            </span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })()}

              <div style={{ marginTop: 8 }}>
                <Input
                  type="number"
                  value={b.monthly}
                  onChange={(e) =>
                    update((s) => ({
                      ...s,
                      budgets: {
                        ...s.budgets,
                        [key]: { ...s.budgets[key], monthly: parseFloat(e.target.value) || 0 },
                      },
                    }))
                  }
                  style={{ width: "100%", fontSize: 12 }}
                />
                <div style={{ fontSize: 11, color: "#8B96A3", marginTop: 2 }}>
                  Edit monthly limit
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      <div style={{ marginTop: 28 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 12 }}>Other spending</div>
        <Card>
          <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 12 }}>
            For anything that doesn't fit groceries, gas, or eating out — no monthly limit, just
            a running log.
          </div>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 20, color: "#1C2B3A" }}>
            {fmt(spentInCategory("other", mKey))}
          </div>
          <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 12 }}>logged this month</div>

          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            <Input
              type="number"
              placeholder="Log spend"
              id="spend-other"
              style={{ flex: 1, minWidth: 100 }}
            />
            <TagInput
              placeholder="Tags, comma separated (optional)"
              knownTags={allKnownTags}
              value={tagDrafts.other || ""}
              onChange={(val) => setTagDrafts((d) => ({ ...d, other: val }))}
              style={{ flex: 2, minWidth: 160 }}
            />
            <Button
              variant="subtle"
              style={{ padding: "6px 10px", fontSize: 12, flexShrink: 0 }}
              onClick={() => {
                const el = document.getElementById("spend-other");
                const val = parseFloat(el.value);
                if (!val) return;
                const tags = parseTags(tagDrafts.other);
                update((s) => ({
                  ...s,
                  spending: [
                    ...s.spending,
                    {
                      id: uid("sp"),
                      category: "other",
                      amount: val,
                      date: todayISO(),
                      monthKey: mKey,
                      tags,
                    },
                  ],
                }));
                el.value = "";
                setTagDrafts((d) => ({ ...d, other: "" }));
              }}
            >
              Add
            </Button>
          </div>

          {(() => {
            const entries = state.spending
              .filter((sp) => sp.category === "other" && sp.monthKey === mKey)
              .slice()
              .reverse();
            if (entries.length === 0) return null;
            return (
              <div style={{ marginTop: 14, borderTop: "1px solid #E3DDC9", paddingTop: 10 }}>
                <div
                  onClick={() => setOtherExpanded((v) => !v)}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    cursor: "pointer",
                    marginBottom: otherExpanded ? 8 : 0,
                  }}
                >
                  <span style={{ fontSize: 12, color: "#8B96A3" }}>
                    {entries.length} entr{entries.length === 1 ? "y" : "ies"} this month
                  </span>
                  <i
                    className={`ti ti-chevron-${otherExpanded ? "up" : "down"}`}
                    style={{ fontSize: 14, color: "#8B96A3" }}
                    aria-hidden="true"
                  />
                </div>
                {otherExpanded && (
                  <Ledger>
                    {entries.map((sp) => (
                      <LedgerRow
                        key={sp.id}
                        label={sp.description ? sp.description : (sp.tags && sp.tags.length ? sp.tags.join(", ") : "Untagged")}
                        sub={`${formatLocalDate(sp.date)}${sp.description && sp.tags && sp.tags.length ? " · " + sp.tags.join(", ") : ""}`}
                        amount={sp.amount}
                      />
                    ))}
                  </Ledger>
                )}
              </div>
            );
          })()}
        </Card>
      </div>
    </div>
  );
}

/* ---------- Shopping List View ---------- */
function ShoppingListView({ state, update, isMobile }) {
  const [newItemName, setNewItemName] = useState("");

  function addItem() {
    if (!newItemName.trim()) return;
    update((s) => ({
      ...s,
      shoppingList: [...s.shoppingList, { id: uid("item"), name: newItemName.trim(), checked: false }],
    }));
    setNewItemName("");
  }

  const remaining = state.shoppingList.filter((i) => !i.checked).length;

  return (
    <div>
      <SectionTitle eyebrow={`${remaining} item${remaining === 1 ? "" : "s"} left`}>Shopping list</SectionTitle>

      <Card>
        <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
          <Input
            placeholder="Add an item"
            value={newItemName}
            onChange={(e) => setNewItemName(e.target.value)}
            onKeyDown={(e) => {
              if (e.key === "Enter") addItem();
            }}
            style={{ flex: 1 }}
          />
          <Button variant="subtle" onClick={addItem}>
            Add
          </Button>
        </div>

        {state.shoppingList.length === 0 ? (
          <div style={{ fontSize: 13, color: "#8B96A3" }}>Nothing on the list yet.</div>
        ) : (
          <Ledger>
            {state.shoppingList.map((item) => (
              <LedgerRow
                key={item.id}
                label={
                  <span
                    style={{
                      textDecoration: item.checked ? "line-through" : "none",
                      color: item.checked ? "#8B96A3" : "#1C2B3A",
                    }}
                  >
                    {item.name}
                  </span>
                }
                right={
                  <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                    <input
                      type="checkbox"
                      checked={item.checked}
                      onChange={() =>
                        update((s) => ({
                          ...s,
                          shoppingList: s.shoppingList.map((x) =>
                            x.id === item.id ? { ...x, checked: !x.checked } : x
                          ),
                        }))
                      }
                    />
                    <span
                      onClick={() =>
                        update((s) => ({
                          ...s,
                          shoppingList: s.shoppingList.filter((x) => x.id !== item.id),
                        }))
                      }
                      style={{ fontSize: 12, color: "#8B96A3", cursor: "pointer" }}
                    >
                      Remove
                    </span>
                  </div>
                }
              />
            ))}
          </Ledger>
        )}

        {state.shoppingList.some((i) => i.checked) && (
          <div style={{ marginTop: 10, textAlign: "right" }}>
            <span
              onClick={() =>
                update((s) => ({
                  ...s,
                  shoppingList: s.shoppingList.filter((x) => !x.checked),
                }))
              }
              style={{ fontSize: 12, color: "#8B96A3", cursor: "pointer" }}
            >
              Clear checked items
            </span>
          </div>
        )}
      </Card>
    </div>
  );
}

/* ---------- Goals View ---------- */
function GoalsView({ state, update, isMobile }) {
  const [name, setName] = useState("");
  const [cost, setCost] = useState("");
  const [hasDeadline, setHasDeadline] = useState(false);
  const [deadline, setDeadline] = useState("");

  const wishlist = state.goals.filter((g) => g.status === "wishlist");
  const active = state.goals.filter((g) => g.status === "active");

  function addGoal() {
    if (!name || !cost) return;
    update((s) => ({
      ...s,
      goals: [
        ...s.goals,
        {
          id: uid("goal"),
          name,
          cost: parseFloat(cost),
          hasDeadline,
          deadline: hasDeadline ? deadline : null,
          status: "wishlist",
          weeklyOverride: null,
          saved: 0,
        },
      ],
    }));
    setName("");
    setCost("");
    setHasDeadline(false);
    setDeadline("");
  }

  function promote(id) {
    update((s) => ({
      ...s,
      goals: s.goals.map((g) => (g.id === id ? { ...g, status: "active" } : g)),
    }));
  }

  function suggestedWeekly(goal) {
    if (goal.weeklyOverride != null) return goal.weeklyOverride;
    if (!goal.hasDeadline || !goal.deadline) return round2(goal.cost / 12); // default: ~3 months
    const weeksLeft = Math.max(
      1,
      Math.ceil((parseLocalDate(goal.deadline) - new Date()) / (1000 * 60 * 60 * 24 * 7))
    );
    return round2((goal.cost - (goal.saved || 0)) / weeksLeft);
  }

  return (
    <div>
      <SectionTitle eyebrow="Wishlist & active savings goals">Goals</SectionTitle>

      <Card style={{ marginBottom: 24 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 12 }}>Add a goal</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Name</div>
            <Input
              placeholder="e.g. New couch"
              value={name}
              onChange={(e) => setName(e.target.value)}
              style={{ width: 180 }}
            />
          </div>
          <div>
            <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Estimated cost</div>
            <Input
              type="number"
              placeholder="0.00"
              value={cost}
              onChange={(e) => setCost(e.target.value)}
              style={{ width: 110 }}
            />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, paddingBottom: 8 }}>
            <input
              type="checkbox"
              checked={hasDeadline}
              onChange={(e) => setHasDeadline(e.target.checked)}
              id="deadline-toggle"
            />
            <label htmlFor="deadline-toggle" style={{ fontSize: 13, color: "#1C2B3A" }}>
              Has a deadline
            </label>
          </div>
          {hasDeadline && (
            <div>
              <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Deadline</div>
              <Input type="date" value={deadline} onChange={(e) => setDeadline(e.target.value)} />
            </div>
          )}
          <Button onClick={addGoal}>Add to wishlist</Button>
        </div>
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 20 }}>
        <Card>
          <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 10 }}>Wishlist</div>
          {wishlist.length === 0 ? (
            <div style={{ fontSize: 13, color: "#8B96A3" }}>Nothing on the wishlist yet.</div>
          ) : (
            <Ledger>
              {wishlist.map((g) => (
                <LedgerRow
                  key={g.id}
                  label={g.name}
                  sub={g.hasDeadline ? `By ${formatLocalDate(g.deadline)}` : "No deadline"}
                  amount={g.cost}
                  right={
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14 }}>
                        {fmt(g.cost)}
                      </span>
                      <Button
                        variant="subtle"
                        style={{ padding: "5px 10px", fontSize: 12 }}
                        onClick={() => promote(g.id)}
                      >
                        Activate
                      </Button>
                    </div>
                  }
                />
              ))}
            </Ledger>
          )}
        </Card>

        <Card>
          <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 4 }}>Active goals</div>
          <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 10 }}>
            Funded from the STSS bucket — currently {fmt(state.buckets.stss)}
          </div>
          {active.length === 0 ? (
            <div style={{ fontSize: 13, color: "#8B96A3" }}>No active goals yet.</div>
          ) : (
            <Ledger>
              {active.map((g) => {
                const weekly = suggestedWeekly(g);
                const pct = Math.min(100, ((g.saved || 0) / g.cost) * 100);
                return (
                  <div key={g.id} style={{ padding: "10px 2px", borderBottom: "1px solid #D8D2C2" }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 14, color: "#1C2B3A" }}>{g.name}</span>
                      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }}>
                        {fmt(g.saved || 0)} / {fmt(g.cost)}
                      </span>
                    </div>
                    <div
                      style={{
                        height: 5,
                        background: "#EDE9DC",
                        borderRadius: 4,
                        overflow: "hidden",
                        margin: "6px 0",
                      }}
                    >
                      <div
                        style={{
                          height: "100%",
                          width: `${pct}%`,
                          background: "#B8924A",
                        }}
                      />
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", fontSize: 12, color: "#8B96A3" }}>
                      <span>Suggested {fmt(weekly)}/wk</span>
                      <Input
                        type="number"
                        placeholder="Override"
                        defaultValue={g.weeklyOverride || ""}
                        style={{ width: 80, fontSize: 12, padding: "4px 8px" }}
                        onBlur={(e) =>
                          update((s) => ({
                            ...s,
                            goals: s.goals.map((x) =>
                              x.id === g.id
                                ? { ...x, weeklyOverride: parseFloat(e.target.value) || null }
                                : x
                            ),
                          }))
                        }
                      />
                    </div>
                  </div>
                );
              })}
            </Ledger>
          )}
        </Card>
      </div>
    </div>
  );
}

/* ---------- Transfers View ---------- */
function TransfersView({ state, update, isMobile }) {
  const pending = state.transfers.filter((t) => !t.done);
  const done = state.transfers.filter((t) => t.done);

  const [fromBucket, setFromBucket] = useState("savings");
  const [toBucket, setToBucket] = useState("bills");
  const [amount, setAmount] = useState("");
  const [reason, setReason] = useState("");

  const mKey = monthKey();
  const bailoutsThisMonth = state.bailouts.filter((b) => b.monthKey === mKey);
  const totalThisMonth = bailoutsThisMonth.reduce((s, b) => s + b.amount, 0);

  // compare to last month for a simple trend signal
  const now = new Date();
  const lastMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const lastMKey = monthKey(lastMonthDate);
  const bailoutsLastMonth = state.bailouts.filter((b) => b.monthKey === lastMKey);
  const totalLastMonth = bailoutsLastMonth.reduce((s, b) => s + b.amount, 0);
  const improving = totalThisMonth < totalLastMonth;
  const hasComparison = bailoutsLastMonth.length > 0 || bailoutsThisMonth.length > 0;

  const BUCKET_OPTIONS = [
    { key: "checking", label: "Checking" },
    { key: "savings", label: "Savings" },
    { key: "bills", label: "Bills" },
    { key: "tax", label: "Taxes" },
    { key: "slush", label: "Slush fund" },
    { key: "stss", label: "STSS" },
  ];

  function logBailout() {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0 || fromBucket === toBucket) return;
    update((s) => {
      const newBuckets = { ...s.buckets };
      newBuckets[fromBucket] = round2((newBuckets[fromBucket] || 0) - amt);
      newBuckets[toBucket] = round2((newBuckets[toBucket] || 0) + amt);
      return {
        ...s,
        buckets: newBuckets,
        bailouts: [
          ...s.bailouts,
          {
            id: uid("bail"),
            fromBucket,
            toBucket,
            amount: amt,
            reason: reason.trim(),
            date: todayISO(),
            monthKey: mKey,
          },
        ],
      };
    });
    setAmount("");
    setReason("");
  }

  return (
    <div>
      <SectionTitle eyebrow="Move this money in your real accounts">To Do</SectionTitle>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 10 }}>Waiting on you</div>
        {pending.length === 0 ? (
          <div style={{ fontSize: 13, color: "#8B96A3" }}>Nothing pending right now.</div>
        ) : (
          <Ledger>
            {pending.map((t) => (
              <TransferRow
                key={t.id}
                t={t}
                right={
                  <Button
                    variant="subtle"
                    style={{ padding: "5px 10px", fontSize: 12 }}
                    onClick={() =>
                      update((s) => ({
                        ...s,
                        transfers: s.transfers.map((x) => (x.id === t.id ? { ...x, done: true } : x)),
                      }))
                    }
                  >
                    Mark done
                  </Button>
                }
              />
            ))}
          </Ledger>
        )}
      </Card>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 10, color: "#8B96A3" }}>
          Completed
        </div>
        {done.length === 0 ? (
          <div style={{ fontSize: 13, color: "#8B96A3" }}>None yet.</div>
        ) : (
          <Ledger>
            {done
              .slice()
              .reverse()
              .slice(0, 10)
              .map((t) => <TransferRow key={t.id} t={t} />)}
          </Ledger>
        )}
      </Card>

      <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 12, marginTop: 8 }}>
        Bailout transfers
      </div>
      <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 14 }}>
        For moving money between buckets to cover a surprise shortfall — tracked separately so
        you can see the pattern and work toward needing fewer of these.
      </div>

      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 16, marginBottom: 20 }}>
        <div
          style={{
            background: totalThisMonth > 0 ? "#F3E3DC" : "#EDE9DC",
            borderRadius: 8,
            padding: "14px 16px",
          }}
        >
          <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 4 }}>This month</div>
          <div
            style={{
              fontFamily: "'IBM Plex Mono', monospace",
              fontSize: 22,
              fontWeight: 500,
              color: totalThisMonth > 0 ? "#8A3C28" : "#1C2B3A",
            }}
          >
            {fmt(totalThisMonth)}
          </div>
          <div style={{ fontSize: 12, color: "#8B96A3", marginTop: 2 }}>
            across {bailoutsThisMonth.length} transfer{bailoutsThisMonth.length === 1 ? "" : "s"}
          </div>
        </div>
        <div style={{ background: "#EDE9DC", borderRadius: 8, padding: "14px 16px" }}>
          <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 4 }}>Vs. last month</div>
          {hasComparison ? (
            <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 22, fontWeight: 500, color: "#1C2B3A" }}>
                {fmt(totalLastMonth)}
              </span>
              {totalThisMonth !== totalLastMonth && (
                <Pill tone={improving ? "good" : "warn"}>
                  {improving ? "Trending down" : "Trending up"}
                </Pill>
              )}
            </div>
          ) : (
            <div style={{ fontSize: 13, color: "#8B96A3" }}>No data yet to compare.</div>
          )}
        </div>
      </div>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 10 }}>Log a bailout transfer</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>From</div>
            <select
              value={fromBucket}
              onChange={(e) => setFromBucket(e.target.value)}
              style={{ fontFamily: "Inter, sans-serif", fontSize: 14, padding: "8px 10px", borderRadius: 6, border: "1px solid #D8D2C2", background: "#FFFEFB", color: "#1C2B3A" }}
            >
              {BUCKET_OPTIONS.map((b) => (
                <option key={b.key} value={b.key}>{b.label}</option>
              ))}
            </select>

function AlertsView({ state, update }) {

  const [importedOk, setImportedOk] = useState(false);

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ledger-backup-${todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    setImportError("");
    setImportedOk(false);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (typeof parsed !== "object" || parsed === null) throw new Error("not an object");
        update({ ...initialState, ...parsed });
        setImportedOk(true);
      } catch (err) {
        setImportError("That file doesn't look like a valid backup — couldn't read it.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }
