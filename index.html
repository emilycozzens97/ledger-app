  ];

  function logBailout() {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0 || fromBucket === toBucket) return;
    update((s) => {
      const newBuckets = { ...s.buckets };
      newBuckets[fromBucket] = round2((newBuckets[fromBucket] || 0) - amt);
      newBuckets[toBucket] = round2((newBuckets[toBucket] || 0) + amt);
      return {
        ...s,
        buckets: newBuckets,
        bailouts: [
          ...s.bailouts,
          {
            id: uid("bail"),
            fromBucket,
            toBucket,
            amount: amt,
            reason: reason.trim(),
            date: todayISO(),
            monthKey: mKey,
            status: STATUS.PENDING,
            postedDate: null,
          },
        ],
      };
    });
    setAmount("");
    setReason("");
  }

  function toggleBailoutPosted(id) {
    update((s) => ({
      ...s,
      bailouts: s.bailouts.map((b) =>
        b.id === id
          ? b.status === STATUS.PAID
            ? { ...b, status: STATUS.PENDING, postedDate: null }
            : { ...b, status: STATUS.PAID, postedDate: todayISO() }
          : b
      ),
    }));
  }

  return (
    <div>
      <SectionTitle eyebrow="Move this money in your real accounts">To Do</SectionTitle>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 10 }}>Waiting on you</div>
        {pending.length === 0 ? (
          <div style={{ fontSize: 13, color: "#8B96A3" }}>Nothing pending right now.</div>
        ) : (
          <Ledger>
            {pending.map((t) => (
              <TransferRow
                key={t.id}
                t={t}
                right={
                  <Button
                    variant="subtle"
                    style={{ padding: "5px 10px", fontSize: 12 }}
                    onClick={() =>
                      update((s) => ({
                        ...s,
                        transfers: s.transfers.map((x) => (x.id === t.id ? { ...x, done: true } : x)),
                      }))
                    }
                  >
                    Mark done
                  </Button>
                }
              />
            ))}
          </Ledger>
        )}
      </Card>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 10, color: "#8B96A3" }}>
          Completed
        </div>
        {done.length === 0 ? (
          <div style={{ fontSize: 13, color: "#8B96A3" }}>None yet.</div>
        ) : (
          <Ledger>
            {done
              .slice()
              .reverse()
              .slice(0, 10)
              .map((t) => <TransferRow key={t.id} t={t} />)}
          </Ledger>
        )}
      </Card>

      <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 12, marginTop: 8 }}>
        Bailout transfers
      </div>
      <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 14 }}>
        For moving money between buckets to cover a surprise shortfall — tracked separately so
        you can see the pattern and work toward needing fewer of these. Your bailout-free streak
        is shown on the Dashboard.
      </div>

      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 16, marginBottom: 20 }}>
        <div
          style={{
            background: totalThisMonth > 0 ? "#F3E3DC" : "#EDE9DC",
            borderRadius: 8,
            padding: "14px 16px",
          }}
        >
          <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 4 }}>This month</div>
          <div
            style={{
              fontFamily: "'IBM Plex Mono', monospace",
              fontSize: 22,
              fontWeight: 500,
              color: totalThisMonth > 0 ? "#8A3C28" : "#1C2B3A",
            }}
          >
            {fmt(totalThisMonth)}
          </div>
          <div style={{ fontSize: 12, color: "#8B96A3", marginTop: 2 }}>
            across {bailoutsThisMonth.length} transfer{bailoutsThisMonth.length === 1 ? "" : "s"}
          </div>
        </div>
        <div style={{ background: "#EDE9DC", borderRadius: 8, padding: "14px 16px" }}>
          <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 4 }}>Vs. last month</div>
          {hasComparison ? (
            <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 22, fontWeight: 500, color: "#1C2B3A" }}>
                {fmt(totalLastMonth)}
              </span>
              {totalThisMonth !== totalLastMonth && (
                <Pill tone={improving ? "good" : "warn"}>
                  {improving ? "Trending down" : "Trending up"}
                </Pill>
              )}
            </div>
          ) : (
            <div style={{ fontSize: 13, color: "#8B96A3" }}>No data yet to compare.</div>
          )}
        </div>
      </div>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 10 }}>Log a bailout transfer</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>From</div>
            <select
              value={fromBucket}
              onChange={(e) => setFromBucket(e.target.value)}
              style={{ fontFamily: "Inter, sans-serif", fontSize: 14, padding: "8px 10px", borderRadius: 6, border: "1px solid #D8D2C2", background: "#FFFEFB", color: "#1C2B3A" }}
            >
              {BUCKET_OPTIONS.map((b) => (
                <option key={b.key} value={b.key}>{b.label}</option>
              ))}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>To</div>
            <select
              value={toBucket}
              onChange={(e) => setToBucket(e.target.value)}
              style={{ fontFamily: "Inter, sans-serif", fontSize: 14, padding: "8px 10px", borderRadius: 6, border: "1px solid #D8D2C2", background: "#FFFEFB", color: "#1C2B3A" }}
            >
              {BUCKET_OPTIONS.map((b) => (
                <option key={b.key} value={b.key}>{b.label}</option>
              ))}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Amount</div>
            <Input
              type="number"
              placeholder="0.00"
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
              style={{ width: 100 }}
            />
          </div>
          <div style={{ flex: 1, minWidth: 160 }}>
            <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>What happened</div>
            <Input
              placeholder="e.g. car repair, grocery overrun"
              value={reason}
              onChange={(e) => setReason(e.target.value)}
              style={{ width: "100%" }}
            />
          </div>
          <Button onClick={logBailout}>Log it</Button>
        </div>
        {fromBucket === toBucket && (
          <div style={{ fontSize: 12, color: "#8A3C28", marginTop: 8 }}>
            Pick two different accounts.
          </div>
        )}
      </Card>

      <Card>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 10 }}>Bailout history</div>
        {state.bailouts.length === 0 ? (
          <div style={{ fontSize: 13, color: "#8B96A3" }}>
            None logged yet — hopefully it stays that way.
          </div>
        ) : (
          <Ledger>
            {state.bailouts
              .slice()
              .reverse()
              .slice(0, 20)
              .map((b) => (
                <LedgerRow
                  key={b.id}
                  label={`${ACCOUNT_DISPLAY_NAMES[b.fromBucket] || b.fromBucket} → ${ACCOUNT_DISPLAY_NAMES[b.toBucket] || b.toBucket}`}
                  sub={`${formatLocalDate(b.date)}${b.reason ? " · " + b.reason : ""}`}
                  amount={b.amount}
                  accent="#8A3C28"
                  right={
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, color: "#8A3C28" }}>
                        {fmt(b.amount)}
                      </span>
                      <StatusBadge
                        status={b.status || "pending"}
                        postedLabel
                        onClick={() => toggleBailoutPosted(b.id)}
                      />
                    </div>
                  }
                />
              ))}
          </Ledger>
        )}
      </Card>

      <IrregularExpensesSection state={state} update={update} isMobile={isMobile} />
    </div>
  );
}

/* Irregular / upcoming one-time expenses — shown in the To Do tab alongside transfers.
   Upcoming ones (due within 30 days) also appear in the Dashboard weekly projection. */
function IrregularExpensesSection({ state, update, isMobile }) {
  const [name, setName] = useState("");
  const [amount, setAmount] = useState("");
  const [dueDate, setDueDate] = useState("");
  const [notes, setNotes] = useState("");

  const expenses = state.irregularExpenses || [];
  const upcoming = expenses.filter((e) => !e.paid).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
  const past = expenses.filter((e) => e.paid).slice(-5).reverse();

  function addExpense() {
    if (!name || !amount || !dueDate) return;
    update((s) => ({
      ...s,
      irregularExpenses: [
        ...(s.irregularExpenses || []),
        { id: uid("irr"), name, amount: parseFloat(amount), dueDate, notes: notes.trim(), paid: false, paidDate: null },
      ],
    }));
    setName(""); setAmount(""); setDueDate(""); setNotes("");
  }

  function markPaid(id) {
    update((s) => ({
      ...s,
      irregularExpenses: (s.irregularExpenses || []).map((e) =>
        e.id === id ? { ...e, paid: true, paidDate: todayISO() } : e
      ),
    }));
  }

  function removeExpense(id) {
    update((s) => ({ ...s, irregularExpenses: (s.irregularExpenses || []).filter((e) => e.id !== id) }));
  }

  const today = new Date(); today.setHours(0,0,0,0);

  return (
    <Card style={{ marginTop: 20 }}>
      <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 4 }}>Upcoming irregular expenses</div>
      <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 14 }}>
        One-time or annual costs coming up — car registration, medical bills, subscriptions, etc.
        Upcoming ones show in the Dashboard projection. Pay them from your sinking fund.
      </div>

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end", marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Name</div>
          <Input placeholder="e.g. Car registration" value={name} onChange={(e) => setName(e.target.value)} style={{ width: 180 }} />
        </div>
        <div>
          <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Amount</div>
          <Input type="number" placeholder="0.00" value={amount} onChange={(e) => setAmount(e.target.value)} style={{ width: 90 }} />
        </div>
        <div>
          <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Due date</div>
          <Input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} />
        </div>
        <div>
          <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>Notes (optional)</div>
          <Input placeholder="e.g. from sinking fund" value={notes} onChange={(e) => setNotes(e.target.value)} style={{ width: 160 }} />
        </div>
        <Button variant="subtle" onClick={addExpense}>Add</Button>
      </div>

      {upcoming.length === 0 ? (
        <div style={{ fontSize: 13, color: "#8B96A3" }}>Nothing upcoming — add one above.</div>
      ) : (
        <Ledger>
          {upcoming.map((e) => {
            const due = new Date(e.dueDate + "T00:00:00");
            const daysAway = Math.round((due - today) / (1000 * 60 * 60 * 24));
            const urgent = daysAway <= 14;
            const overdue = daysAway < 0;
            return (
              <LedgerRow
                key={e.id}
                label={e.name}
                sub={
                  overdue ? `Overdue by ${Math.abs(daysAway)}d` :
                  daysAway === 0 ? "Due today" :
                  `Due in ${daysAway}d · ${formatLocalDate(e.dueDate)}${e.notes ? " · " + e.notes : ""}`
                }
                amount={e.amount}
                accent={overdue ? "#8A3C28" : urgent ? "#7A5D24" : undefined}
                right={
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <Button variant="subtle" style={{ fontSize: 12, padding: "4px 10px" }} onClick={() => markPaid(e.id)}>
                      Mark paid
                    </Button>
                    <span onClick={() => removeExpense(e.id)} style={{ fontSize: 12, color: "#8B96A3", cursor: "pointer" }}>Remove</span>
                  </div>
                }
              />
            );
          })}
        </Ledger>
      )}

      {past.length > 0 && (
        <div style={{ marginTop: 14, borderTop: "1px solid #E3DDC9", paddingTop: 12 }}>
          <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 8 }}>Recently paid</div>
          <Ledger>
            {past.map((e) => (
              <LedgerRow key={e.id} label={e.name} sub={e.paidDate ? `Paid ${formatLocalDate(e.paidDate)}` : "Paid"} amount={e.amount} />
            ))}
          </Ledger>
        </div>
      )}
    </Card>
  );
}
/* ---------- Reports View ----------
   Full monthly spending breakdown with category totals, tag breakdowns, income
   summary, bills, bailouts, and month-over-month comparison. Defaults to the
   current calendar month; a dropdown lets you switch to any month present in the
   data. A CSV download captures everything currently visible for that month. */
function ReportsView({ state, isMobile }) {
  const currentMKey = monthKey();

  /* build sorted list of all month keys that appear anywhere in the data */
  const allMonthKeys = useMemo(() => {
    const keys = new Set([currentMKey]);
    state.income.forEach((i) => keys.add(i.monthKey));
    state.spending.forEach((s) => keys.add(s.monthKey));
    state.bailouts.forEach((b) => keys.add(b.monthKey));
    state.billPaidHistory.forEach((h) => keys.add(h.monthKey));
    return [...keys].sort().reverse(); // newest first
  }, [state, currentMKey]);

  const [selectedMKey, setSelectedMKey] = useState(currentMKey);

  /* previous month key for comparison */
  function prevMKey(mk) {
    const [y, m] = mk.split("-").map(Number);
    const prev = new Date(y, m - 2, 1);
    return monthKey(prev);
  }
  const prevKey = prevMKey(selectedMKey);

  function monthLabel(mk) {
    const [y, m] = mk.split("-").map(Number);
    return new Date(y, m - 1, 1).toLocaleDateString(undefined, { month: "long", year: "numeric" });
  }

  /* ── data selectors ── */
  function incomeForMonth(mk) {
    return state.income.filter((i) => i.monthKey === mk);
  }
  function spendingForMonth(mk) {
    return state.spending.filter((s) => s.monthKey === mk);
  }
  function bailoutsForMonth(mk) {
    return state.bailouts.filter((b) => b.monthKey === mk);
  }
  function billHistoryForMonth(mk) {
    return state.billPaidHistory.filter((h) => h.monthKey === mk);
  }

  const income = incomeForMonth(selectedMKey);
  const prevIncome = incomeForMonth(prevKey);
  const spending = spendingForMonth(selectedMKey);
  const prevSpending = spendingForMonth(prevKey);
  const bailouts = bailoutsForMonth(selectedMKey);
  const prevBailouts = bailoutsForMonth(prevKey);
  const billHistory = billHistoryForMonth(selectedMKey);

  /* ── computed totals ── */
  const totalIncome = round2(income.reduce((s, i) => s + i.amount, 0));
  const prevTotalIncome = round2(prevIncome.reduce((s, i) => s + i.amount, 0));
  const regularIncome = round2(income.filter((i) => i.type === "regular").reduce((s, i) => s + i.amount, 0));
  const freelanceIncome = round2(income.filter((i) => i.type === "freelance").reduce((s, i) => s + i.amount, 0));

  const budgetCategories = Object.entries(state.budgets).map(([key, b]) => ({ key, label: b.label, monthly: b.monthly }));

  function catSpend(key, sp) {
    return round2(sp.filter((s) => s.category === key).reduce((sum, s) => sum + s.amount, 0));
  }
  function catTags(key, sp) {
    const entries = sp.filter((s) => s.category === key);
    const tagMap = {};
    entries.forEach((s) => {
      const tags = s.tags && s.tags.length ? s.tags : ["untagged"];
      tags.forEach((t) => { tagMap[t] = round2((tagMap[t] || 0) + s.amount); });
    });
    return Object.entries(tagMap).sort((a, b) => b[1] - a[1]);
  }

  const otherSpend = round2(spending.filter((s) => s.category === "other").reduce((sum, s) => sum + s.amount, 0));
  const prevOtherSpend = round2(prevSpending.filter((s) => s.category === "other").reduce((sum, s) => sum + s.amount, 0));
  const totalSpend = round2(spending.reduce((s, x) => s + x.amount, 0));
  const prevTotalSpend = round2(prevSpending.reduce((s, x) => s + x.amount, 0));

  const totalBailouts = round2(bailouts.reduce((s, b) => s + b.amount, 0));
  const prevTotalBailouts = round2(prevBailouts.reduce((s, b) => s + b.amount, 0));

  /* bills info pulled from the bill paid history for the selected month */
  const billsPaidCount = billHistory.length;
  const billsPaidTotal = round2(billHistory.reduce((s, h) => s + h.amount, 0));

  /* ── delta helper ── */
  function delta(current, previous) {
    if (previous === 0) return null;
    return round2(current - previous);
  }
  function DeltaPill({ curr, prev, lowerIsBetter = false }) {
    const d = delta(curr, prev);
    if (d === null || prev === 0) return null;
    const up = d > 0;
    const good = lowerIsBetter ? !up : up;
    const color = good ? "#3B5C40" : "#8A3C28";
    const bg = good ? "#E4ECE4" : "#F3E3DC";
    return (
      <span style={{ fontSize: 11.5, fontWeight: 500, padding: "2px 8px", borderRadius: 20, background: bg, color, marginLeft: 8 }}>
        {up ? "+" : ""}{fmt(d)}
      </span>
    );
  }

  /* ── CSV download ── */
  function downloadCSV() {
    const rows = [["Month", monthLabel(selectedMKey)], [""]];

    rows.push(["INCOME"]);
    rows.push(["Type", "Amount"]);
    rows.push(["Regular", regularIncome]);
    rows.push(["Freelance", freelanceIncome]);
    rows.push(["Total income", totalIncome]);
    rows.push([""]);

    rows.push(["SPENDING BY CATEGORY"]);
    rows.push(["Category", "Amount", "Budget", "vs Budget"]);
    budgetCategories.forEach(({ key, label, monthly }) => {
      const spent = catSpend(key, spending);
      rows.push([label, spent, monthly, round2(spent - monthly)]);
    });
    rows.push(["Other", otherSpend, "", ""]);
    rows.push(["Total spending", totalSpend, "", ""]);
    rows.push([""]);

    rows.push(["TAG BREAKDOWN"]);
    budgetCategories.forEach(({ key, label }) => {
      const tags = catTags(key, spending);
      if (tags.length) {
        rows.push([label + " tags"]);
        tags.forEach(([tag, amt]) => rows.push(["", tag, amt]));
      }
    });
    rows.push([""]);

    rows.push(["BILLS PAID THIS MONTH"]);
    rows.push(["Bill", "Amount", "Date paid"]);
    billHistory.forEach((h) => rows.push([h.billName, h.amount, h.paidDate || ""]));
    rows.push(["Total bills paid", billsPaidTotal, ""]);
    rows.push([""]);

    rows.push(["BAILOUT TRANSFERS"]);
    rows.push(["From", "To", "Amount", "Reason", "Date"]);
    bailouts.forEach((b) => rows.push([
      b.fromBucket, b.toBucket, b.amount, b.reason || "", b.date || ""
    ]));
    rows.push(["Total bailouts", totalBailouts, "", "", ""]);

    const csv = rows.map((r) => r.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ledger-report-${selectedMKey}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  const hasPrev = allMonthKeys.includes(prevKey);

  return (
    <div>
      {/* header + month picker */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12, marginBottom: 20 }}>
        <SectionTitle eyebrow="Monthly breakdown">{monthLabel(selectedMKey)}</SectionTitle>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <select
            value={selectedMKey}
            onChange={(e) => setSelectedMKey(e.target.value)}
            style={{
              fontFamily: "Inter, sans-serif", fontSize: 13.5, padding: "7px 10px",
              borderRadius: 6, border: "1px solid #D8D2C2", background: "#FFFEFB", color: "#1C2B3A",
            }}
          >
            {allMonthKeys.map((mk) => (
              <option key={mk} value={mk}>{monthLabel(mk)}</option>
            ))}
          </select>
          <Button variant="subtle" onClick={downloadCSV}>
            Export CSV
          </Button>
        </div>
      </div>

      {/* ── Income ── */}
      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 12 }}>Income</div>
        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 1fr" : "repeat(4, 1fr)", gap: 12, marginBottom: hasPrev ? 12 : 0 }}>
          {[
            { label: "Total", value: totalIncome, prev: prevTotalIncome, lowerIsBetter: false },
            { label: "W-2", value: regularIncome, prev: round2(prevIncome.filter((i) => i.type === "regular").reduce((s, i) => s + i.amount, 0)) },
            { label: "Freelance", value: freelanceIncome, prev: round2(prevIncome.filter((i) => i.type === "freelance").reduce((s, i) => s + i.amount, 0)) },
            { label: "Projection", value: state.monthlyIncomeProjection, prev: null },
          ].map(({ label, value, prev, lowerIsBetter }) => (
            <div key={label} style={{ background: "#F7F4EC", borderRadius: 6, padding: "10px 12px" }}>
              <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>{label}</div>
              <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 17, fontWeight: 500, color: "#1C2B3A" }}>
                {fmt(value)}
              </div>
              {hasPrev && prev !== null && (
                <div style={{ fontSize: 11.5, color: "#8B96A3", marginTop: 2 }}>
                  prev {fmt(prev)}
                  <DeltaPill curr={value} prev={prev} lowerIsBetter={lowerIsBetter} />
                </div>
              )}
            </div>
          ))}
        </div>
        {income.length === 0 && (
          <div style={{ fontSize: 13, color: "#8B96A3" }}>No income logged for this month.</div>
        )}
      </Card>

      {/* ── Spending by category ── */}
      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 12 }}>Spending by category</div>
        <Ledger>
          {budgetCategories.map(({ key, label, monthly }) => {
            const spent = catSpend(key, spending);
            const prev = catSpend(key, prevSpending);
            const pct = monthly > 0 ? Math.min(100, Math.round((spent / monthly) * 100)) : null;
            const over = monthly > 0 && spent > monthly;
            const tags = catTags(key, spending);
            const cc = CATEGORY_COLORS[key] || CATEGORY_COLORS.other;
            return (
              <div key={key} style={{ padding: "10px 0", borderBottom: "1px solid #E3DDC9" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                  <span style={{ fontSize: 13.5, fontWeight: 500, color: cc.text }}>{label}</span>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, color: over ? "#8A3C28" : "#1C2B3A" }}>
                    {fmt(spent)}
                    {monthly > 0 && (
                      <span style={{ fontSize: 12, color: "#8B96A3", marginLeft: 4 }}>/ {fmt(monthly)}</span>
                    )}
                    {hasPrev && <DeltaPill curr={spent} prev={prev} lowerIsBetter />}
                  </span>
                </div>
                {monthly > 0 && pct !== null && (
                  <div style={{ height: 4, borderRadius: 2, background: "#E3DDC9", marginBottom: 6 }}>
                    <div style={{ height: "100%", borderRadius: 2, width: `${pct}%`, background: over ? "#8A3C28" : cc.bar }} />
                  </div>
                )}
                {tags.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {tags.map(([tag, amt]) => (
                      <span key={tag} style={{ fontSize: 11.5, background: cc.bg, color: cc.text, padding: "2px 8px", borderRadius: 20 }}>
                        {tag} {fmt(amt)}
                      </span>
                    ))}
                  </div>
                )}
              </div>
            );
          })}

          {/* Other spending */}
          <div style={{ padding: "10px 0", borderBottom: "1px solid #E3DDC9" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
              <span style={{ fontSize: 13.5, fontWeight: 500, color: CATEGORY_COLORS.other.text }}>Other</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, color: "#1C2B3A" }}>
                {fmt(otherSpend)}
                {hasPrev && <DeltaPill curr={otherSpend} prev={prevOtherSpend} lowerIsBetter />}
              </span>
            </div>
            {catTags("other", spending).length > 0 && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {catTags("other", spending).map(([tag, amt]) => (
                  <span key={tag} style={{ fontSize: 11.5, background: CATEGORY_COLORS.other.bg, color: CATEGORY_COLORS.other.text, padding: "2px 8px", borderRadius: 20 }}>
                    {tag} {fmt(amt)}
                  </span>
                ))}
              </div>
            )}
          </div>

          {/* Total row */}
          <div style={{ padding: "12px 0 4px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <span style={{ fontSize: 13.5, fontWeight: 500, color: "#1C2B3A" }}>Total spending</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 15, fontWeight: 500 }}>
                {fmt(totalSpend)}
                {hasPrev && <DeltaPill curr={totalSpend} prev={prevTotalSpend} lowerIsBetter />}
              </span>
            </div>
          </div>
        </Ledger>
        {spending.length === 0 && (
          <div style={{ fontSize: 13, color: "#8B96A3", marginTop: 8 }}>No spending logged for this month.</div>
        )}
      </Card>

      {/* ── Bills ── */}
      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 12 }}>Bills paid this month</div>
        {billHistory.length === 0 ? (
          <div style={{ fontSize: 13, color: "#8B96A3" }}>No bills marked as paid this month.</div>
        ) : (
          <Ledger>
            {billHistory.map((h) => (
              <LedgerRow
                key={h.id}
                label={h.billName}
                sub={h.paidDate ? `Paid ${formatLocalDate(h.paidDate)}` : ""}
                amount={h.amount}
              />
            ))}
            <LedgerRow
              label="Total"
              amount={billsPaidTotal}
            />
          </Ledger>
        )}
      </Card>

      {/* ── Bailouts ── */}
      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 4 }}>Bailout transfers</div>
        <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 12 }}>
          {bailouts.length} transfer{bailouts.length === 1 ? "" : "s"} · {fmt(totalBailouts)} total
          {hasPrev && <DeltaPill curr={totalBailouts} prev={prevTotalBailouts} lowerIsBetter />}
        </div>
        {bailouts.length === 0 ? (
          <div style={{ fontSize: 13, color: "#3B5C40", fontWeight: 500 }}>
            No bailout transfers this month
          </div>
        ) : (
          <Ledger>
            {bailouts.map((b) => (
              <LedgerRow
                key={b.id}
                label={`${ACCOUNT_DISPLAY_NAMES[b.fromBucket] || b.fromBucket} → ${ACCOUNT_DISPLAY_NAMES[b.toBucket] || b.toBucket}`}
                sub={b.reason || "No reason logged"}
                amount={b.amount}
                accent="#8A3C28"
              />
            ))}
          </Ledger>
        )}
      </Card>

      {/* ── Net summary ── */}
      <Card>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 12 }}>Net summary</div>
        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 1fr" : "repeat(3, 1fr)", gap: 12 }}>
          {[
            { label: "Income", value: totalIncome, tone: "good" },
            { label: "Spending", value: totalSpend, tone: "warn" },
            { label: "Net", value: round2(totalIncome - totalSpend), tone: totalIncome >= totalSpend ? "good" : "warn" },
          ].map(({ label, value, tone }) => (
            <div key={label} style={{
              background: tone === "good" ? "#E4ECE4" : tone === "warn" ? "#F3E3DC" : "#EDE9DC",
              borderRadius: 6, padding: "12px 14px",
            }}>
              <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>{label}</div>
              <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 18, fontWeight: 500, color: tone === "good" ? "#3B5C40" : "#8A3C28" }}>
                {fmt(value)}
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

/* ---------- Alerts View ---------- */
function AlertsView({ state, update, setView }) {
  const pace = checkPaceAlert(state);
  const [customLabel, setCustomLabel] = useState("");
  const [expandedRequests, setExpandedRequests] = useState({}); // { [limId]: boolean }
  const [importError, setImportError] = useState("");
  const [importedOk, setImportedOk] = useState(false);
  const [resetConfirming, setResetConfirming] = useState(false);

  function resetAllData() {
    update(initialState);
    setResetConfirming(false);
    if (setView) setView("setup");
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ledger-backup-${todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    setImportError("");
    setImportedOk(false);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (typeof parsed !== "object" || parsed === null) throw new Error("not an object");
        update({ ...initialState, ...parsed });
        setImportedOk(true);
      } catch (err) {
        setImportError("That file doesn't look like a valid backup — couldn't read it.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  return (
    <div>
      <SectionTitle eyebrow="Stay ahead of trouble">Alerts</SectionTitle>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 4 }}>Leftover split</div>
        <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 14, maxWidth: 460 }}>
          After bills and budget allocations, how leftover income divides between your spending
          money, goals, and sinking fund. Must add up to 100%.
        </div>
        {(() => {
          const sp = state.leftoverSplit || { slush: 50, stss: 50, sinkingFund: 0 };
          const total = (sp.slush || 0) + (sp.stss || 0) + (sp.sinkingFund || 0);
          const valid = total === 100;
          return (
            <div>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 10 }}>
                {[
                  { key: "slush", label: "Slush fund" },
                  { key: "stss", label: "STSS (goals)" },
                  { key: "sinkingFund", label: "Sinking fund" },
                ].map(({ key, label }) => (
                  <div key={key} style={{ minWidth: 120 }}>
                    <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>{label}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <Input
                        type="number"
                        min="0"
                        max="100"
                        value={sp[key] || 0}
                        onChange={(e) => {
                          const val = Math.max(0, Math.min(100, parseInt(e.target.value) || 0));
                          update((s) => ({
                            ...s,
                            leftoverSplit: { ...(s.leftoverSplit || { slush: 50, stss: 50, sinkingFund: 0 }), [key]: val },
                          }));
                        }}
                        style={{ width: 70 }}
                      />
                      <span style={{ fontSize: 13, color: "#8B96A3" }}>%</span>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 12.5, color: valid ? "#3B5C40" : "#8A3C28", fontWeight: 500 }}>
                Total: {total}% {valid ? "✓" : "— must equal 100%"}
              </div>
            </div>
          );
        })()}
      </Card>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 4 }}>Move data between devices</div>
        <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 14, maxWidth: 460 }}>
          Download everything in this app as a single file, then import that same file on another
          device's copy of the app to bring your data over.
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
          <Button variant="subtle" onClick={exportData}>
            Export data
          </Button>
          <label
            style={{
              display: "inline-flex",
              alignItems: "center",
              padding: "8px 14px",
              borderRadius: 6,
              border: "1px solid #D8D2C2",
              background: "#FFFEFB",
              color: "#1C2B3A",
              fontSize: 13.5,
              fontWeight: 500,
              cursor: "pointer",
            }}
          >
            Import data
            <input type="file" accept="application/json" onChange={importData} style={{ display: "none" }} />
          </label>
        </div>
        {importError && (
          <div style={{ fontSize: 12.5, color: "#8A3C28", marginTop: 10 }}>{importError}</div>
        )}
        {importedOk && (
          <div style={{ fontSize: 12.5, color: "#3B5C40", marginTop: 10 }}>
            Imported successfully — your data here now matches the file.
          </div>
        )}
      </Card>

      <Card style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 4 }}>Reset all data</div>
        <div style={{ fontSize: 12.5, color: "#8B96A3", marginBottom: 14, maxWidth: 460 }}>
          Clears every bill, paycheck, invoice, spending entry, bailout, goal, and balance — back
          to a completely blank app, as if freshly installed. This cannot be undone, so export a
          backup first if there's any chance you'll want this data later.
        </div>
        {!resetConfirming ? (
          <Button variant="subtle" onClick={() => setResetConfirming(true)}>
            Reset all data
          </Button>
        ) : (
          <div style={{ background: "#F3E3DC", border: "1px solid #D9A98D", borderRadius: 8, padding: "12px 14px" }}>
            <div style={{ fontSize: 13, color: "#8A3C28", fontWeight: 500, marginBottom: 10 }}>
              Are you sure? Everything will be erased and you'll be taken back to Setup.
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Button onClick={resetAllData} style={{ background: "#8A3C28" }}>
                Yes, erase everything
              </Button>
              <Button variant="ghost" onClick={() => setResetConfirming(false)}>

                key={c.id}

                    checked={c.on}

                      update((s) => ({

        <div style={{ display: "flex", gap: 8, marginTop: 12 }}>

          <Button

              update((s) => ({

                      display: "flex",

                      justifyContent: "space-between",

                    <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #E3DDC9" }}>
                      <div style={{ fontSize: 12.5, color: "#8A3C28", marginBottom: 6, lineHeight: 1.5 }}>

                        <span style={{ fontWeight: 500 }}>Real path there: </span>

  );

/* ---------- Setup wizard ----------
   Builds this month's history first (income, invoices, bills, spending), running each
   item through the same allocation/conversion logic as normal data entry, so the bucket
   math arrives at a realistic state. Only at the very end does the person enter their
   actual current account balances — which simply overwrite whatever the simulation
   produced, since the real bank balance is ground truth. */
const SETUP_STEPS = [
  { id: "projection", title: "Monthly income projection" },
  { id: "paychecks", title: "Paychecks logged this month" },
  { id: "invoices", title: "Invoices" },
  { id: "bills", title: "Bills this month" },
  { id: "spending", title: "Additional spending" },
  { id: "balances", title: "Current account balances" },
  { id: "leftoversplit", title: "Leftover split" },
  { id: "moneydate", title: "Weekly money date" },
];

const DAY_NAMES = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

function SetupWizard({ state, update, isMobile, onFinish }) {
  // all wizard progress lives in state.setupDraft so it survives closing and reopening
  // the app — every setter below writes through `update`, same pattern as the rest
  // of the app, rather than local component state that would vanish on unmount.
  const draft = state.setupDraft;

  function patchDraft(patch) {
    update((s) => ({ ...s, setupDraft: { ...s.setupDraft, ...patch } }));
  }

  const step = draft.step;
  const setStep = (n) => patchDraft({ step: n });
  const projection = draft.projection;
  const setProjection = (v) => patchDraft({ projection: v });
  const draftPaychecks = draft.draftPaychecks;
  const setDraftPaychecks = (fn) =>
    patchDraft({ draftPaychecks: typeof fn === "function" ? fn(draft.draftPaychecks) : fn });
  const draftInvoices = draft.draftInvoices;
  const setDraftInvoices = (fn) =>
    patchDraft({ draftInvoices: typeof fn === "function" ? fn(draft.draftInvoices) : fn });
  const draftBillsPaid = draft.draftBillsPaid;
  const setDraftBillsPaid = (fn) =>
    patchDraft({ draftBillsPaid: typeof fn === "function" ? fn(draft.draftBillsPaid) : fn });
  const draftSpending = draft.draftSpending;
  const setDraftSpending = (fn) =>
    patchDraft({ draftSpending: typeof fn === "function" ? fn(draft.draftSpending) : fn });
  const balances = draft.balances;
  const setBalances = (fn) =>
    patchDraft({ balances: typeof fn === "function" ? fn(draft.balances) : fn });

  const mKey = monthKey();
  const stepInfo = SETUP_STEPS[step];

  function goNext() {
    if (step < SETUP_STEPS.length - 1) setStep(step + 1);
  }
  function goBack() {
    if (step > 0) setStep(step - 1);
  }

  /* runs all drafted history through the same engines used elsewhere in the app,
     building up income/transfers/buckets in order, then overwrites the resulting
     balances with whatever was entered in the final step. */
  function commitSetup() {
    update((s) => {
      let working = { ...s, monthlyIncomeProjection: projection };

      // 1. paychecks — each runs through allocateIncome, same as the Income tab
      draftPaychecks.forEach((p) => {
        const entry = {
          id: uid("inc"),
          date: p.date,
          amount: round2(parseFloat(p.amount) || 0),
          type: p.type,
          monthKey: monthKey(parseLocalDate(p.date)),
        };
        if (entry.amount <= 0) return;
        const moves = allocateIncome(entry, working);
        const newBuckets = { ...working.buckets };
        const newTransfers = [...working.transfers];
        moves.forEach((m) => {
          newBuckets[m.bucket] = round2((newBuckets[m.bucket] || 0) + m.amount);
          if (m.bucket === "savings" || m.bucket === "tax" || m.bucket === "bills") {
            newTransfers.push({
              id: uid("xfer"),
              fromAccount: "Checking",
              toAccount: ACCOUNT_DISPLAY_NAMES[m.bucket] || m.bucket,
              amount: m.amount,
              note: m.note,
              target: m.bucket,
              done: !!m.alreadyDeducted,
              createdAt: entry.date,
              monthKey: entry.monthKey,
            });
          }
        });
        working = { ...working, income: [...working.income, entry], buckets: newBuckets, transfers: newTransfers };
      });

      // 2. invoices — unpaid ones just get added; paid ones convert to income via the
      //    same conversion function used on the Invoices tab (always freelance, dated today
      //    for the income entry, but keeping their real issue date on the invoice record)
      draftInvoices.forEach((inv) => {
        const amount = round2(parseFloat(inv.amount) || 0);
        if (!inv.description || amount <= 0) return;
        const invoiceRecord = {
          id: uid("inv"),
          description: inv.description,
          amount,
          issueDate: inv.issueDate,
          status: inv.status === "pending" ? "pending" : "unpaid",
          paidDate: null,
          incomeId: null,
        };
        working = { ...working, invoices: [...working.invoices, invoiceRecord] };
        if (inv.status === "paid") {
          working = convertInvoiceToIncome(working, invoiceRecord.id);
        }
      });

      // 3. bills — drafted ones marked "already paid" go straight to Paid
      // (advance twice: Unpaid -> Pending -> Paid), same end state as checking
      // the box twice elsewhere in the app
      Object.keys(draftBillsPaid).forEach((billId) => {
        if (draftBillsPaid[billId]) {
          working = advanceBillStatus(working, billId);
          working = advanceBillStatus(working, billId);
        }
      });

      // 4. additional category spending — backfilled history, so default to
      // settled status since these already happened
      const newSpending = [...working.spending];
      draftSpending.forEach((sp) => {
        const amount = round2(parseFloat(sp.amount) || 0);
        if (!sp.category || amount <= 0) return;
        newSpending.push({
          id: uid("sp"),
          category: sp.category,
          description: sp.description ? sp.description.trim() : "",
          amount,
          date: sp.date,
          monthKey: monthKey(parseLocalDate(sp.date)),
          tags: parseTags(sp.tags),
          status: STATUS.PAID,
        });
      });
      working = { ...working, spending: newSpending };

      // recompute slush/STSS split now that the full month's drafted history is in
      const split = computeMonthlySplit(working, mKey);
      working = {
        ...working,
        buckets: { ...working.buckets, slush: split.slushAdd, stss: split.stssAdd, sinkingFund: split.sinkingFundAdd },
      };

      // 5. final step: actual balances overwrite whatever the simulation produced —
      // the real bank balance is ground truth, not the simulated one
      working = {
        ...working,
        buckets: {
          ...working.buckets,
          checking: round2(parseFloat(balances.checking) || 0),
          savings: round2(parseFloat(balances.savings) || 0),
          bills: round2(parseFloat(balances.bills) || 0),
          tax: round2(parseFloat(balances.tax) || 0),
          slush: round2(parseFloat(balances.slush) || 0),
          stss: round2(parseFloat(balances.stss) || 0),
          sinkingFund: round2(parseFloat(balances.sinkingFund) || 0),
        },
        setupCompleted: true,
        setupDraft: initialState.setupDraft,
      };

      return working;
    });
    onFinish();
  }

  return (
    <div>
      <SectionTitle eyebrow={`Step ${step + 1} of ${SETUP_STEPS.length}`}>{stepInfo.title}</SectionTitle>

      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, fontSize: 12, color: "#8B96A3" }}>
        <i className="ti ti-device-floppy" style={{ fontSize: 13 }} aria-hidden="true" />
        Your progress saves automatically — close this any time and pick back up later.
      </div>

      <div style={{ display: "flex", gap: 4, marginBottom: 20, marginTop: 10, flexWrap: "wrap" }}>
        {SETUP_STEPS.map((st, i) => (
          <div
            key={st.id}
            onClick={() => setStep(i)}
            style={{
              flex: isMobile ? "0 0 auto" : 1,
              height: 4,
              borderRadius: 2,
              background: i <= step ? "#1C2B3A" : "#E3DDC9",
              cursor: "pointer",
              minWidth: isMobile ? 28 : undefined,
            }}
          />
        ))}
      </div>

      {step === 0 && (
        <Card style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 12 }}>
            What do you expect to bring in this month, in total? This is used to track pace
            against your income as the month goes on.
          </div>
          <Input
            type="number"
            value={projection}
            onChange={(e) => setProjection(parseFloat(e.target.value) || 0)}
            style={{ width: 140 }}
          />
        </Card>
      )}

      {step === 1 && (
        <PaycheckDraftStep drafts={draftPaychecks} setDrafts={setDraftPaychecks} />
      )}

      {step === 2 && (
        <InvoiceDraftStep drafts={draftInvoices} setDrafts={setDraftInvoices} />
      )}

      {step === 3 && (
        <BillsDraftStep bills={state.bills} draftPaid={draftBillsPaid} setDraftPaid={setDraftBillsPaid} />
      )}

      {step === 4 && (
        <SpendingDraftStep
          budgets={state.budgets}
          drafts={draftSpending}
          setDrafts={setDraftSpending}
          knownTags={Array.from(
            new Set(
              state.spending.flatMap((sp) => (sp.tags && sp.tags.length ? sp.tags : sp.tag ? [sp.tag] : []))
            )
          )}
        />
      )}

      {step === 5 && (
        <Card>
          <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 14 }}>
            Enter your real current balances. These overwrite anything the history above would
            otherwise add up to, since your actual bank balance is always ground truth.
          </div>
          <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 1fr" : "repeat(3, 1fr)", gap: 14 }}>
            {[
              { key: "checking", label: "Checking" },
              { key: "savings", label: "Savings" },
              { key: "bills", label: "Bills" },
              { key: "tax", label: "Taxes" },
              { key: "slush", label: "Slush fund" },
              { key: "stss", label: "STSS (goals)" },
              { key: "sinkingFund", label: "Sinking fund" },
            ].map((f) => (
              <div key={f.key}>
                <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 4 }}>{f.label}</div>
                <Input
                  type="number"
                  value={balances[f.key] || state.buckets[f.key] || 0}
                  onChange={(e) =>
                    setBalances((b) => ({ ...b, [f.key]: e.target.value }))
                  }
                  style={{ width: "100%" }}
                />
              </div>
            ))}
          </div>
        </Card>
      )}

      {step === 6 && (
        <Card>
          <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 14 }}>
            After bills and spending budgets, how should leftover income split between your free
            spending money, goals fund, and sinking fund for irregular expenses? Percentages must
            add up to 100. You can adjust this any time from the Alerts tab.
          </div>
          {(() => {
            const sp = state.leftoverSplit || { slush: 50, stss: 50, sinkingFund: 0 };
            const total = (sp.slush || 0) + (sp.stss || 0) + (sp.sinkingFund || 0);
            const valid = total === 100;
            return (
              <div>
                <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 12 }}>
                  {[
                    { key: "slush", label: "Slush fund", desc: "Free spending — household, clothes, fun" },
                    { key: "stss", label: "STSS (goals)", desc: "Funds your active savings goals weekly" },
                    { key: "sinkingFund", label: "Sinking fund", desc: "Reserves for irregular one-time expenses" },
                  ].map(({ key, label, desc }) => (
                    <div key={key} style={{ flex: 1, minWidth: 140 }}>
                      <div style={{ fontSize: 13.5, fontWeight: 500, color: "#1C2B3A", marginBottom: 2 }}>{label}</div>
                      <div style={{ fontSize: 12, color: "#8B96A3", marginBottom: 8 }}>{desc}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <Input
                          type="number"
                          min="0"
                          max="100"
                          value={sp[key] || 0}
                          onChange={(e) => {
                            const val = Math.max(0, Math.min(100, parseInt(e.target.value) || 0));
                            update((s) => ({
                              ...s,
                              leftoverSplit: { ...(s.leftoverSplit || { slush: 50, stss: 50, sinkingFund: 0 }), [key]: val },
                            }));
                          }}
                          style={{ width: 70 }}
                        />
                        <span style={{ fontSize: 13, color: "#8B96A3" }}>%</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 13, fontWeight: 500, color: valid ? "#3B5C40" : "#8A3C28", padding: "8px 12px", borderRadius: 6, background: valid ? "#E4ECE4" : "#F3E3DC" }}>
                  Total: {total}% {valid ? "✓ Good to go" : "— needs to equal 100% before you can continue"}
                </div>
              </div>
            );
          })()}
        </Card>
      )}

      {step === 7 && (
        <Card>
          <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 14 }}>
            A recurring weekly time to check in on your finances together. You'll get a heads-up
            banner in the app 30 minutes before. You can change this any time from the Alerts tab.
          </div>
          <MoneyDateControls moneyDate={state.moneyDate} update={update} />
        </Card>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 24 }}>
        <Button variant="ghost" onClick={goBack} style={{ visibility: step === 0 ? "hidden" : "visible" }}>
          Back
        </Button>
        {step < SETUP_STEPS.length - 1 ? (
          (() => {
            const sp = state.leftoverSplit || { slush: 50, stss: 50, sinkingFund: 0 };
            const splitTotal = (sp.slush || 0) + (sp.stss || 0) + (sp.sinkingFund || 0);
            const blocked = step === 6 && splitTotal !== 100;
            return (
              <Button onClick={goNext} style={blocked ? { opacity: 0.4, cursor: "not-allowed" } : {}}
                {...(blocked ? { onClick: undefined } : {})}>
                Next
              </Button>
            );
          })()
        ) : (
          <Button onClick={commitSetup}>Finish setup</Button>
        )}
      </div>

      {state.setupCompleted && (
        <div style={{ marginTop: 20, textAlign: "center" }}>
          <span
            onClick={onFinish}
            style={{ fontSize: 12.5, color: "#8B96A3", cursor: "pointer" }}
          >
            Cancel and return to dashboard
          </span>
        </div>
      )}
    </div>
  );
}

function PaycheckDraftStep({ drafts, setDrafts }) {
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState(todayISO());
  const [type, setType] = useState("regular");

  function add() {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return;
    setDrafts((d) => [...d, { id: uid("draft"), amount, date, type }]);
    setAmount("");
  }
  function remove(id) {
    setDrafts((d) => d.filter((x) => x.id !== id));
  }

  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 12 }}>
        Add each paycheck or freelance payment you've already received this month, with the date
        it landed. For regular paychecks, enter the amount that hit checking.
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end", marginBottom: 14 }}>
        <Input type="number" placeholder="Amount" value={amount} onChange={(e) => setAmount(e.target.value)} style={{ width: 110 }} />
        <Input type="date" value={date} onChange={(e) => setDate(e.target.value)} />
        <select
          value={type}
          onChange={(e) => setType(e.target.value)}
          style={{ fontFamily: "Inter, sans-serif", fontSize: 14, padding: "8px 10px", borderRadius: 6, border: "1px solid #D8D2C2", background: "#FFFEFB", color: "#1C2B3A" }}
        >
          <option value="regular">W-2</option>
          <option value="freelance">Freelance</option>
        </select>
        <Button variant="subtle" onClick={add}>Add</Button>
      </div>
      {drafts.length === 0 ? (
        <div style={{ fontSize: 13, color: "#8B96A3" }}>None added yet — that's fine if this is your first paycheck of the month.</div>
      ) : (
        <Ledger>
          {drafts.map((d) => (
            <LedgerRow
              key={d.id}
              label={d.type === "freelance" ? "Freelance income" : "W-2 income"}
              sub={formatLocalDate(d.date)}
              amount={parseFloat(d.amount) || 0}
              right={
                <span onClick={() => remove(d.id)} style={{ fontSize: 12, color: "#8B96A3", cursor: "pointer" }}>
                  Remove
                </span>
              }
            />
          ))}
        </Ledger>
      )}
    </Card>
  );
}

function InvoiceDraftStep({ drafts, setDrafts }) {
  const [description, setDescription] = useState("");
  const [amount, setAmount] = useState("");
  const [issueDate, setIssueDate] = useState(todayISO());
  const [status, setStatus] = useState("unpaid");

  function add() {
    const amt = parseFloat(amount);
    if (!description || !amt || amt <= 0) return;
    setDrafts((d) => [...d, { id: uid("draft"), description, amount, issueDate, status }]);
    setDescription("");
    setAmount("");
  }
  function remove(id) {
    setDrafts((d) => d.filter((x) => x.id !== id));
  }

  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 12 }}>
        Add any invoices relevant to this month — both ones you're still waiting on, and ones
        already paid. Paid ones will be converted into freelance income automatically.
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end", marginBottom: 14 }}>
        <Input placeholder="Description" value={description} onChange={(e) => setDescription(e.target.value)} style={{ width: 200 }} />
        <Input type="number" placeholder="Amount" value={amount} onChange={(e) => setAmount(e.target.value)} style={{ width: 100 }} />
        <Input type="date" value={issueDate} onChange={(e) => setIssueDate(e.target.value)} />
        <select
          value={status}
          onChange={(e) => setStatus(e.target.value)}
          style={{ fontFamily: "Inter, sans-serif", fontSize: 14, padding: "8px 10px", borderRadius: 6, border: "1px solid #D8D2C2", background: "#FFFEFB", color: "#1C2B3A" }}
        >
          <option value="unpaid">Unpaid</option>
          <option value="pending">Pending (payment in motion)</option>
          <option value="paid">Already paid</option>
        </select>
        <Button variant="subtle" onClick={add}>Add</Button>
      </div>
      {drafts.length === 0 ? (
        <div style={{ fontSize: 13, color: "#8B96A3" }}>No invoices yet — skip ahead if this doesn't apply to you.</div>
      ) : (
        <Ledger>
          {drafts.map((d) => (
            <LedgerRow
              key={d.id}
              label={d.description}
              sub={`Issued ${formatLocalDate(d.issueDate)} · ${d.status}`}
              amount={parseFloat(d.amount) || 0}
              right={
                <span onClick={() => remove(d.id)} style={{ fontSize: 12, color: "#8B96A3", cursor: "pointer" }}>
                  Remove
                </span>
              }
            />
          ))}
        </Ledger>
      )}
    </Card>
  );
}

function BillsDraftStep({ bills, draftPaid, setDraftPaid }) {
  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 12 }}>
        Check off any of your recurring bills that you've already paid so far this month.
      </div>
      <Ledger>
        {[...bills].sort((a, b) => a.day - b.day).map((b) => (
          <LedgerRow
            key={b.id}
            label={b.name}
            sub={billDueSub(b)}
            amount={b.amount}
            right={
              <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, color: "#1C2B3A", cursor: "pointer" }}>
                <input
                  type="checkbox"
                  checked={!!draftPaid[b.id]}
                  onChange={() => setDraftPaid((d) => ({ ...d, [b.id]: !d[b.id] }))}
                />
                Already paid
              </label>
            }
          />
        ))}
      </Ledger>
    </Card>
  );
}

function SpendingDraftStep({ budgets, drafts, setDrafts, knownTags }) {
  const categoryOptions = [
    ...Object.entries(budgets).map(([key, b]) => ({ key, label: b.label })),
    { key: "other", label: "Other" },
  ];

  const [category, setCategory] = useState(categoryOptions[0].key);
  const [description, setDescription] = useState("");
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState(todayISO());
  const [tags, setTags] = useState("");

  function categoryLabel(key) {
    return categoryOptions.find((c) => c.key === key)?.label || key;
  }

  function add() {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return;
    setDrafts((d) => [...d, { id: uid("draft"), category, description, amount, date, tags }]);
    setDescription("");
    setAmount("");
    setTags("");
  }
  function remove(id) {
    setDrafts((d) => d.filter((x) => x.id !== id));
  }

  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 13, color: "#8B96A3", marginBottom: 12 }}>
        Add any groceries, gas, eating-out, or other spending from earlier this month that you
        want reflected in your budgets.
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end", marginBottom: 14 }}>
        <select
          value={category}
          onChange={(e) => setCategory(e.target.value)}
          style={{ fontFamily: "Inter, sans-serif", fontSize: 14, padding: "8px 10px", borderRadius: 6, border: "1px solid #D8D2C2", background: "#FFFEFB", color: "#1C2B3A" }}
        >
          {categoryOptions.map((c) => (
            <option key={c.key} value={c.key}>{c.label}</option>
          ))}
        </select>
        <Input
          placeholder="Description"
          value={description}
          onChange={(e) => setDescription(e.target.value)}
          style={{ width: 160 }}
        />
        <Input type="number" placeholder="Amount" value={amount} onChange={(e) => setAmount(e.target.value)} style={{ width: 100 }} />
        <Input type="date" value={date} onChange={(e) => setDate(e.target.value)} />
        <TagInput
          placeholder="Tags, comma separated"
          knownTags={knownTags}
          value={tags}
          onChange={(val) => setTags(val)}
          style={{ width: 180 }}
        />
        <Button variant="subtle" onClick={add}>Add</Button>
      </div>
      {drafts.length === 0 ? (
        <div style={{ fontSize: 13, color: "#8B96A3" }}>Nothing added yet — that's fine if you're starting fresh.</div>
      ) : (
        <Ledger>
          {drafts.map((d) => (
            <LedgerRow
              key={d.id}
              label={d.description ? d.description : categoryLabel(d.category)}
              sub={`${categoryLabel(d.category)} · ${formatLocalDate(d.date)}${d.tags ? " · " + d.tags : ""}`}
              amount={parseFloat(d.amount) || 0}
              right={
                <span onClick={() => remove(d.id)} style={{ fontSize: 12, color: "#8B96A3", cursor: "pointer" }}>
                  Remove
                </span>
              }
            />
          ))}
        </Ledger>
      )}
    </Card>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BudgetApp />);
</script>
</body>
</html>
